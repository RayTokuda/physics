<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Interference Master</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { margin: 0; background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .canvas-container {
            image-rendering: pixelated;
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        /* Chrome, Safari, Edge, Opera - Hide number input arrows */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        /* Firefox - Hide number input arrows */
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // --- Game Configuration ---
        const TOTAL_ROUNDS = 5;
        const BASE_POINTS_PER_ROUND = 3;
        const EXTRA_CREDIT_PER_ROUND = 1;
        const TOLERANCE_RADIANS = 0.05; 

        // Hardcoded point values to guarantee 25 max base points
        const P2_BASE_POINTS = { data1: 4, q1: 4, data2: 4, q2: 4, syn1: 3, syn2: 3, syn3: 3 };
        
        // Sequences for Exp 1 and Exp 2 Data Collection
        const P2_EXP1_D_SEQ = [40, 60, 80, 100];
        const P2_EXP2_THETA_SEQ = [20, 40, 60, 80];

        // --- Shared Components ---

        // Simple reusable SVG Graph Component
        const SimpleGraph = ({ data, xKey, yKey, xLabel, yLabel, title, showTrendline = true }) => {
            if (data.length === 0) return <div className="h-48 bg-slate-900 rounded flex items-center justify-center text-slate-500">No data yet</div>;
            
            const xMax = Math.max(...data.map(d => d[xKey]), 10) * 1.1;
            const yMax = Math.max(...data.map(d => d[yKey]), 10) * 1.1;
            
            // Calculate trendline slope assuming it passes through origin
            const lastPoint = data[data.length - 1];
            const slope = lastPoint[yKey] / lastPoint[xKey];
            const trendYAtXMax = slope * xMax;
            const svgTrendY = 180 - (trendYAtXMax / yMax) * 160;

            return (
                <div className="flex flex-col items-center w-full">
                    <div className="text-xs font-bold text-slate-400 mb-2">{title}</div>
                    <svg viewBox="0 0 300 200" className="bg-slate-900 rounded-lg border border-slate-700 w-full max-w-sm h-auto shadow-inner">
                        {/* Axes */}
                        <line x1="30" y1="20" x2="30" y2="180" stroke="#475569" strokeWidth="2" />
                        <line x1="30" y1="180" x2="280" y2="180" stroke="#475569" strokeWidth="2" />
                        
                        {/* Trendline */}
                        {showTrendline && data.length > 1 && (
                            <line x1="30" y1="180" x2="280" y2={Math.max(20, svgTrendY)} stroke="#10b981" strokeWidth="2" strokeDasharray="4 4" opacity="0.6" />
                        )}

                        {/* Connecting Line (for curves) */}
                        {!showTrendline && data.length > 1 && (
                            <polyline
                                points={data.map(d => `${30 + (d[xKey]/xMax)*250},${180 - (d[yKey]/yMax)*160}`).join(' ')}
                                fill="none" stroke="#3b82f6" strokeWidth="2" opacity="0.5"
                            />
                        )}

                        {/* Data points */}
                        {data.map((d, i) => (
                            <circle key={i} 
                                cx={30 + (d[xKey]/xMax)*250} 
                                cy={180 - (d[yKey]/yMax)*160} 
                                r="5" fill="#3b82f6" 
                                stroke="#1e293b" strokeWidth="2"
                            />
                        ))}

                        {/* Labels */}
                        <text x="155" y="195" fill="#94a3b8" fontSize="10" textAnchor="middle">{xLabel}</text>
                        <text x="10" y="100" fill="#94a3b8" fontSize="10" textAnchor="middle" transform="rotate(-90 10,100)">{yLabel}</text>
                    </svg>
                </div>
            );
        };

        // Layout Wrapper Component
        const SimulationPanel = ({ children, titleBadge, canvasRef }) => (
            <div className="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-6">
                <div className="bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-xl flex flex-col items-center">
                    <div className="w-full flex justify-between text-xs text-slate-400 mb-2 px-2 font-mono">
                        <span>{titleBadge}</span>
                        <span className="text-amber-400 font-bold">MATCH TO ANTINODES</span>
                    </div>
                    <div className="canvas-container bg-black w-full aspect-square max-w-[400px]">
                        <canvas ref={canvasRef} width="200" height="200" className="w-full h-full object-cover" />
                    </div>
                </div>
                <div className="flex flex-col gap-4">
                    {children}
                </div>
            </div>
        );

        // Fine Wavelength Input Component
        const WavelengthControls = ({ userLambda, setUserLambda, isChecking, lockedSlider }) => {
            const [inputValue, setInputValue] = useState(userLambda.toString());
            
            useEffect(() => {
                setInputValue(userLambda.toString());
            }, [userLambda]);

            const handleInputChange = (e) => {
                setInputValue(e.target.value);
                const val = parseFloat(e.target.value);
                if (!isNaN(val) && val >= 10 && val <= 100) {
                    setUserLambda(val);
                }
            };

            return (
                <div>
                    <div className="flex justify-between mb-2">
                        <label className="text-sm font-medium text-slate-300 flex items-center gap-2">
                            Wavelength <span className="text-teal-400 font-mono text-xs">(λ)</span>
                            {lockedSlider === 'lambda' && <span className="text-[10px] bg-slate-700 px-2 py-0.5 rounded text-slate-300 ml-2">LOCKED</span>}
                        </label>
                        <span className="text-teal-400 font-mono font-bold">{Number(userLambda).toFixed(1)}</span>
                    </div>
                    <div className="flex items-center gap-2">
                        <button onClick={() => setUserLambda(l => Math.max(10, l - 0.1))} disabled={isChecking || lockedSlider === 'lambda'} className="w-8 h-8 flex items-center justify-center bg-slate-700 hover:bg-slate-600 rounded text-slate-300 font-bold disabled:opacity-50 transition-colors">-</button>
                        
                        <input type="range" min="10" max="100" step="0.5" value={userLambda} onChange={(e) => setUserLambda(parseFloat(e.target.value))} disabled={isChecking || lockedSlider === 'lambda'} className={`flex-grow h-2 bg-slate-700 rounded-lg appearance-none ${isChecking || lockedSlider === 'lambda' ? 'cursor-not-allowed' : 'cursor-pointer'}`} style={{accentColor: '#14b8a6'}} />
                        
                        <button onClick={() => setUserLambda(l => Math.min(100, l + 0.1))} disabled={isChecking || lockedSlider === 'lambda'} className="w-8 h-8 flex items-center justify-center bg-slate-700 hover:bg-slate-600 rounded text-slate-300 font-bold disabled:opacity-50 transition-colors">+</button>
                        
                        <input type="number" min="10" max="100" step="0.1" value={inputValue} onChange={handleInputChange} disabled={isChecking || lockedSlider === 'lambda'} className="w-16 h-8 px-1 bg-slate-900 border border-slate-600 rounded text-teal-400 font-mono text-center text-sm focus:outline-none focus:border-teal-400 disabled:opacity-50" />
                    </div>
                </div>
            );
        };


        const App = () => {
            const [appMode, setAppMode] = useState('p1'); 
            const [gameState, setGameState] = useState('intro'); 
            const [accessCode, setAccessCode] = useState('');
            
            const [score, setScore] = useState(0);
            const [extraCredit, setExtraCredit] = useState(0);
            const [freeCorrectionsLeft, setFreeCorrectionsLeft] = useState(2);
            
            const [userD, setUserD] = useState(60);
            const [userLambda, setUserLambda] = useState(20);
            const [targetAngle, setTargetAngle] = useState(0);
            const [lockedSlider, setLockedSlider] = useState(null); 
            
            const [feedback, setFeedback] = useState("");
            const [feedbackType, setFeedbackType] = useState(""); 
            const [isChecking, setIsChecking] = useState(false);

            const canvasRef = useRef(null);
            const requestRef = useRef();
            const timeRef = useRef(0);

            const verificationCode = useMemo(() => Math.random().toString(36).substring(2, 8).toUpperCase(), []);
            
            // P1
            const [round, setRound] = useState(1);
            const [attemptsThisRound, setAttemptsThisRound] = useState(0);
            const [pointsLostThisRound, setPointsLostThisRound] = useState(0);

            // P2
            const [p2Stage, setP2Stage] = useState('data1'); 
            const [p2Data1, setP2Data1] = useState([]);
            const [p2Data2, setP2Data2] = useState([]);
            const [p2TargetThetaDeg, setP2TargetThetaDeg] = useState(30);
            const [p2QAnswer, setP2QAnswer] = useState('');
            const [p2AttemptsThisStage, setP2AttemptsThisStage] = useState(0);
            const [p2MistakesThisStage, setP2MistakesThisStage] = useState(0); 
            const [showDataReview, setShowDataReview] = useState(false);
            
            // P2 Syn3 specific state
            const [syn3A, setSyn3A] = useState('');
            const [syn3B, setSyn3B] = useState('');
            const [syn3C, setSyn3C] = useState('');
            const [syn3D, setSyn3D] = useState('');

            const calculatedSlope = useMemo(() => {
                if (p2Data1.length >= 2) {
                    return (p2Data1[p2Data1.length - 1].lambda / p2Data1[p2Data1.length - 1].d).toFixed(3);
                }
                return "0.000";
            }, [p2Data1]);

            const calculateAngle = (lambda, d) => {
                if (lambda > d) return NaN;
                return Math.asin(lambda / d);
            };

            // --- PART 1 LOGIC ---
            const startRoundP1 = (roundNum) => {
                setRound(roundNum);
                setAttemptsThisRound(0);
                setPointsLostThisRound(0);
                setFeedback("");
                setFeedbackType("");
                setIsChecking(false);
                timeRef.current = 0; 

                if (roundNum === 4) {
                    setLockedSlider('d');
                    const targetLambda = 15 + Math.random() * 20;
                    setTargetAngle(calculateAngle(targetLambda, 60));
                    setUserD(60);
                    setUserLambda(targetLambda > 25 ? 12 : 38); 
                } else if (roundNum === 5) {
                    setLockedSlider('lambda');
                    const targetD = 40 + Math.random() * 40;
                    setTargetAngle(calculateAngle(25, targetD));
                    setUserD(targetD > 60 ? 35 : 95); 
                    setUserLambda(25);
                } else {
                    setLockedSlider(null);
                    const randD = 40 + Math.random() * 50;
                    const randLambda = 15 + Math.random() * 20;
                    const safeLambda = Math.min(randLambda, randD * 0.8);
                    setTargetAngle(calculateAngle(safeLambda, randD));
                    setUserD(60);
                    setUserLambda(20);
                }
            };

            const handleCheckP1 = () => {
                if (isChecking) return;
                const currentAngle = calculateAngle(userLambda, userD);
                
                if (isNaN(currentAngle)) {
                    setFeedback("Wavelength too large compared to distance! Try increasing distance or decreasing wavelength.");
                    setFeedbackType("error");
                    setAttemptsThisRound(a => a + 1);
                    if (freeCorrectionsLeft > 0) setFreeCorrectionsLeft(prev => prev - 1);
                    else setPointsLostThisRound(prev => prev + 1);
                    return;
                }

                const diff = Math.abs(currentAngle - targetAngle);

                if (diff <= TOLERANCE_RADIANS) {
                    setIsChecking(true);
                    setFeedbackType("success");
                    let earnedBasePoints = BASE_POINTS_PER_ROUND;

                    if (attemptsThisRound === 0) {
                        setExtraCredit(prev => prev + EXTRA_CREDIT_PER_ROUND);
                        setFeedback("Perfect match on the first try!");
                    } else {
                        earnedBasePoints = Math.max(1, BASE_POINTS_PER_ROUND - pointsLostThisRound);
                        if (pointsLostThisRound === 0) setFeedback("Great job! You found it! Full points awarded.");
                        else setFeedback(`You found it! You earned ${earnedBasePoints} out of ${BASE_POINTS_PER_ROUND} points.`);
                    }
                    
                    setScore(prev => prev + earnedBasePoints);
                    setTimeout(() => {
                        if (round < TOTAL_ROUNDS) startRoundP1(round + 1);
                        else endGame();
                    }, 2500);
                } else {
                    setAttemptsThisRound(a => a + 1);
                    if (freeCorrectionsLeft > 0) setFreeCorrectionsLeft(prev => prev - 1);
                    else setPointsLostThisRound(prev => prev + 1);
                    
                    setFeedbackType("hint");
                    if (currentAngle > targetAngle) setFeedback("Pattern too WIDE. To make narrower: INCREASE distance (d) or DECREASE wavelength (λ).");
                    else setFeedback("Pattern too NARROW. To make wider: DECREASE distance (d) or INCREASE wavelength (λ).");
                }
            };

            // --- PART 2 LOGIC ---
            const startPart2Stage = (stage) => {
                setP2Stage(stage);
                setFeedback("");
                setFeedbackType("");
                setP2AttemptsThisStage(0);
                setP2MistakesThisStage(0);
                setP2QAnswer('');
                setSyn3A(''); setSyn3B(''); setSyn3C(''); setSyn3D('');
                setIsChecking(false);
                timeRef.current = 0;

                if (stage === 'data1') {
                    const randomThetaDeg = [30, 40, 50, 60][Math.floor(Math.random() * 4)];
                    setP2TargetThetaDeg(randomThetaDeg);
                    setTargetAngle(randomThetaDeg * (Math.PI / 180));
                    setLockedSlider('d');
                    setP2Data1([]);
                    setUserD(P2_EXP1_D_SEQ[0]);
                    setUserLambda(10); 
                } else if (stage === 'data2') {
                    const randomD = [60, 70, 80, 90][Math.floor(Math.random() * 4)];
                    setUserD(randomD);
                    setLockedSlider('d');
                    setP2Data2([]);
                    setTargetAngle(P2_EXP2_THETA_SEQ[0] * (Math.PI / 180));
                    setUserLambda(10); 
                }
            };

            const handleRecordDataP2 = () => {
                if (isChecking) return;

                if (p2Stage === 'data1') {
                    const currentAngle = calculateAngle(userLambda, userD);
                    
                    if (isNaN(currentAngle)) {
                        setP2AttemptsThisStage(prev => prev + 1);
                        setFeedbackType("error");
                        setFeedback("Wavelength is mathematically too large for this distance (no pattern forms). Decrease Wavelength.");
                        return;
                    }

                    const diff = Math.abs(currentAngle - targetAngle);
                    
                    if (diff <= TOLERANCE_RADIANS) {
                        setFeedbackType("success");
                        const newData = [...p2Data1, { lambda: userLambda, d: userD }];
                        setP2Data1(newData);
                        
                        if (newData.length >= P2_EXP1_D_SEQ.length) {
                            setIsChecking(true);
                            setScore(prev => prev + Math.max(1, P2_BASE_POINTS.data1 - p2MistakesThisStage));
                            if (p2MistakesThisStage === 0 && p2AttemptsThisStage === P2_EXP1_D_SEQ.length - 1) {
                                setExtraCredit(prev => Math.min(5, prev + 1));
                            }
                            setFeedback("Experiment 1 Data Collection Complete!");
                            setTimeout(() => startPart2Stage('q1'), 2000);
                        } else {
                            setUserD(P2_EXP1_D_SEQ[newData.length]);
                            setUserLambda(10); 
                            setFeedback(`Point recorded! Now find the wavelength for d = ${P2_EXP1_D_SEQ[newData.length]}`);
                        }
                    } else {
                        setP2AttemptsThisStage(prev => prev + 1);
                        if (freeCorrectionsLeft > 0) setFreeCorrectionsLeft(prev => prev - 1);
                        else setP2MistakesThisStage(prev => prev + 1);
                        
                        setFeedbackType("hint");
                        if (currentAngle > targetAngle) setFeedback("Pattern too wide. DECREASE Wavelength (λ).");
                        else setFeedback("Pattern too narrow. INCREASE Wavelength (λ).");
                    }

                } else if (p2Stage === 'data2') {
                    const currentAngle = calculateAngle(userLambda, userD);
                    
                    if (isNaN(currentAngle)) {
                        setP2AttemptsThisStage(prev => prev + 1);
                        setFeedbackType("error");
                        setFeedback("Wavelength is mathematically too large for this distance. Pick a smaller wavelength.");
                        return;
                    }

                    const diff = Math.abs(currentAngle - targetAngle);

                    if (diff <= TOLERANCE_RADIANS) {
                        setFeedbackType("success");
                        const exactTargetDeg = P2_EXP2_THETA_SEQ[p2Data2.length];
                        const exactTargetRad = exactTargetDeg * (Math.PI / 180);
                        
                        const newData = [...p2Data2, { 
                            lambda: userLambda, 
                            thetaDeg: exactTargetDeg, 
                            sinTheta: Math.sin(exactTargetRad) 
                        }];
                        setP2Data2(newData);
                        
                        if (newData.length >= P2_EXP2_THETA_SEQ.length) {
                            setIsChecking(true);
                            setScore(prev => prev + Math.max(1, P2_BASE_POINTS.data2 - p2MistakesThisStage));
                            if (p2MistakesThisStage === 0 && p2AttemptsThisStage === P2_EXP2_THETA_SEQ.length - 1) {
                                setExtraCredit(prev => Math.min(5, prev + 1));
                            }
                            setFeedback("Experiment 2 Data Collection Complete!");
                            setTimeout(() => startPart2Stage('q2'), 2000);
                        } else {
                            setTargetAngle(P2_EXP2_THETA_SEQ[newData.length] * (Math.PI / 180));
                            setUserLambda(10);
                            setFeedback(`Point recorded! Now adjust wavelength to hit the new target angle (${P2_EXP2_THETA_SEQ[newData.length]}°).`);
                        }
                    } else {
                        setP2AttemptsThisStage(prev => prev + 1);
                        if (freeCorrectionsLeft > 0) setFreeCorrectionsLeft(prev => prev - 1);
                        else setP2MistakesThisStage(prev => prev + 1);
                        
                        setFeedbackType("hint");
                        if (currentAngle > targetAngle) setFeedback("Pattern too wide. DECREASE Wavelength (λ).");
                        else setFeedback("Pattern too narrow. INCREASE Wavelength (λ).");
                    }
                }
            };

            const submitP2QuestionMulti = (isCorrect, nextStage, hints) => {
                if (isChecking) return;

                if (isCorrect) {
                    setIsChecking(true);
                    setFeedbackType("success");
                    setFeedback("Correct! Excellent job.");
                    
                    setScore(prev => prev + Math.max(1, P2_BASE_POINTS[p2Stage] - p2MistakesThisStage));
                    
                    // Award 1 extra credit if perfect attempt
                    if (p2AttemptsThisStage === 0 && p2MistakesThisStage === 0) {
                         setExtraCredit(prev => Math.min(5, prev + 1));
                    }

                    setTimeout(() => {
                        if (nextStage === 'win') endGame();
                        else startPart2Stage(nextStage);
                    }, 2000);
                } else {
                    setP2AttemptsThisStage(prev => prev + 1);
                    if (freeCorrectionsLeft > 0) setFreeCorrectionsLeft(prev => prev - 1);
                    else setP2MistakesThisStage(prev => prev + 1);
                    
                    setFeedbackType("error");
                    const hintIndex = Math.min(p2AttemptsThisStage, hints.length - 1);
                    setFeedback(`Incorrect. Hint: ${hints[hintIndex]}`);
                }
            };

            const handleSyn3Submit = () => {
                const isA_Correct = syn3A === 'lambda';
                const isBC_Correct = (syn3B === 'd' && syn3C === 'sin_theta') || (syn3B === 'sin_theta' && syn3C === 'd');
                const isD_Correct = syn3D === 'd_correct';

                submitP2QuestionMulti(isA_Correct && isBC_Correct && isD_Correct, 'win', [
                    "You found that λ = k · d, and k = sin(θ). Substitute sin(θ) for k in the equation builder.",
                    "The equation should be λ = d · sin(θ). To solve for d, divide both sides by sin(θ)."
                ]);
            };

            // --- Game Flow Control ---
            const startGame = () => {
                setScore(0);
                setExtraCredit(0);
                setFreeCorrectionsLeft(3); 
                
                if (accessCode.trim().toUpperCase() === 'MASTER2') {
                    setAppMode('p2');
                    setGameState('playing');
                    startPart2Stage('data1');
                } else {
                    setAppMode('p1');
                    setGameState('playing');
                    startRoundP1(1);
                }
            };

            const endGame = () => {
                setGameState('win');
                const bursts = extraCredit >= 3 ? 3 : extraCredit > 0 ? 2 : 1;
                let count = 0;
                const interval = setInterval(() => {
                    confetti({ particleCount: 150, spread: 80, origin: { y: 0.5, x: 0.5 }, colors: ['#3b82f6', '#10b981', '#ffffff']});
                    count++;
                    if (count >= bursts) clearInterval(interval);
                }, 800);
            };

            // --- Simulation Rendering Loop ---
            const renderCanvas = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;

                const imgData = ctx.createImageData(width, height);
                const data = imgData.data;

                const cx = width / 2;
                const cy = 20;
                const d = userD;
                const lambda = userLambda;
                const k = (2 * Math.PI) / lambda;
                const omega = 0.5; 
                const t = timeRef.current;
                const v_phase = omega / k;
                const maxRadius = v_phase * t;

                const s1x = cx - d / 2;
                const s2x = cx + d / 2;

                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const dist1 = Math.sqrt((x - s1x) ** 2 + (y - cy) ** 2);
                        const dist2 = Math.sqrt((x - s2x) ** 2 + (y - cy) ** 2);

                        let wave1 = 0;
                        if (dist1 < maxRadius) {
                            const edgeDampening = Math.min(1, (maxRadius - dist1) / lambda);
                            wave1 = Math.sin(k * dist1 - omega * t) * edgeDampening;
                        }

                        let wave2 = 0;
                        if (dist2 < maxRadius) {
                            const edgeDampening = Math.min(1, (maxRadius - dist2) / lambda);
                            wave2 = Math.sin(k * dist2 - omega * t) * edgeDampening;
                        }

                        const intensity = (wave1 + wave2 + 2) / 4; 
                        
                        const r = Math.floor(10 + intensity * 30);
                        const g = Math.floor(50 + intensity * 150);
                        const b = Math.floor(150 + intensity * 105);

                        const index = (y * width + x) * 4;
                        data[index] = r;
                        data[index + 1] = g;
                        data[index + 2] = b;
                        data[index + 3] = 255; 
                    }
                }

                ctx.putImageData(imgData, 0, 0);

                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(s1x, cy, 4, 0, 2 * Math.PI); ctx.fill();
                ctx.beginPath(); ctx.arc(s2x, cy, 4, 0, 2 * Math.PI); ctx.fill();

                // Draw Overlays
                if (gameState === 'playing') {
                    const lineLength = 250;

                    const drawAngleOverlay = (angle, color, isDashed) => {
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                        ctx.lineWidth = 1;
                        ctx.setLineDash([4, 4]);
                        ctx.beginPath(); 
                        ctx.moveTo(cx, cy); 
                        ctx.lineTo(cx, cy + lineLength); 
                        ctx.stroke();
                        
                        ctx.strokeStyle = color;
                        ctx.lineWidth = 2;
                        if (isDashed) ctx.setLineDash([8, 8]);
                        else ctx.setLineDash([]);
                        
                        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx - Math.sin(angle) * lineLength, cy + Math.cos(angle) * lineLength); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.sin(angle) * lineLength, cy + Math.cos(angle) * lineLength); ctx.stroke();
                        ctx.setLineDash([]);
                        
                        ctx.strokeStyle = color;
                        ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.arc(cx, cy, 60, Math.PI/2 - angle, Math.PI/2, false); ctx.stroke();
                        ctx.beginPath(); ctx.arc(cx, cy, 60, Math.PI/2, Math.PI/2 + angle, false); ctx.stroke();
                        
                        ctx.fillStyle = color;
                        ctx.font = 'italic 16px serif';
                        ctx.fillText('θ', cx + Math.sin(angle/2) * 75 - 5, cy + Math.cos(angle/2) * 75 + 5);
                        ctx.fillText('θ', cx - Math.sin(angle/2) * 75 - 5, cy + Math.cos(angle/2) * 75 + 5);
                    };

                    // Render Dashed Targets

                        ctx.fillText(`θ = ${deg.toFixed(1)}°`, cx - 35, cy + 177);

                                    <div className="bg-slate-900 p-6 rounded-xl border border-slate-700 mb-8 space-y-4 text-center text-lg">
                                        <p>From Experiment 1, you proved: <br/><span className="font-mono text-2xl text-blue-400 font-bold block mt-2 bg-slate-800 py-3 rounded">λ = k · d</span></p>
                                        <p>From Experiment 2, you proved: <br/><span className="font-mono text-2xl text-emerald-400 font-bold block mt-2 bg-slate-800 py-3 rounded">λ = K · sin(θ)</span></p>
                                    </div>

                                    <div className="mb-6">
                                        <p className="text-slate-300 mb-4 text-lg font-medium">To combine these into one master equation, we need to know what the unknown constant <span className="font-mono text-blue-400">k</span> from the first equation actually is.</p>
                                        <p className="text-slate-400 mb-4">Let's look at your specific data. What was the constant angle <span className="font-mono font-bold text-amber-400">θ</span> that we locked you into during Experiment 1?</p>
                                        
                                        <select 
                                            className="w-full p-4 bg-slate-900 border border-slate-600 rounded-xl text-white text-lg focus:outline-none focus:border-purple-500 cursor-pointer"
                                            value={p2QAnswer}
                                            onChange={(e) => setP2QAnswer(e.target.value)}
                                        >
                                            <option value="" disabled>Select the angle you used...</option>
                                            {[15, p2TargetThetaDeg, 55, 70].sort((a,b)=>a-b).map(val => (
                                                <option key={val} value={val}>{val}°</option>
                                            ))}
                                        </select>
                                    </div>

                                    <button onClick={() => submitP2QuestionMulti(p2QAnswer === p2TargetThetaDeg.toString(), 'syn2', [
                                        `If you forgot, click the "Review Lab Data" button in the top right corner!`,
                                        `Select ${p2TargetThetaDeg} from the dropdown.`
                                    ])} disabled={!p2QAnswer || isChecking} className="w-full bg-purple-600 hover:bg-purple-500 disabled:opacity-50 text-white py-4 rounded-xl font-bold text-lg shadow-lg">Confirm Angle</button>
                                </>
                            )}

                            {p2Stage === 'syn2' && (
                                <>
                                    <h2 className="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-6 mt-4 text-center">Identifying the Constant</h2>
                                    
                                    <div className="text-slate-300 text-lg space-y-4 mb-8">
                                        <p>You correctly remembered that your fixed angle was <span className="font-mono text-amber-400 font-bold">{p2TargetThetaDeg}°</span>.</p>
                                        <p>In your first experiment, your data line <span className="font-mono text-blue-400">λ = k · d</span> had a slope (k) of approximately <span className="font-mono font-bold bg-slate-900 px-2 rounded">{Math.sin(p2TargetThetaDeg * Math.PI/180).toFixed(3)}</span>.</p>
                                        <div className="bg-slate-900 border border-purple-500/50 p-4 rounded-xl mt-4 text-center">
                                            <p className="text-sm text-slate-400 mb-1">Grab a calculator! What is the sine of your angle?</p>
                                            <p className="font-mono text-xl text-emerald-400 font-bold">sin({p2TargetThetaDeg}°) = {Math.sin(p2TargetThetaDeg * Math.PI/180).toFixed(3)}</p>
                                        </div>
                                    </div>

                                    <p className="text-slate-300 mb-6 text-xl text-center">Because these numbers match perfectly, what must the constant <span className="font-mono text-blue-400 font-bold">k</span> represent in the equation <span className="font-mono">λ = k · d</span>?</p>
                                    
                                    <div className="space-y-3 mb-8">
                                        <button onClick={() => setP2QAnswer('syn2_a')} className={`w-full p-4 rounded-xl text-center border transition-all ${p2QAnswer === 'syn2_a' ? 'border-purple-500 bg-purple-500/20 text-white' : 'border-slate-600 bg-slate-900 text-slate-400 hover:bg-slate-700'}`}>
                                            <span className="font-mono text-xl font-bold">k = sin(θ)</span>
                                        </button>
                                        <button onClick={() => setP2QAnswer('syn2_b')} className={`w-full p-4 rounded-xl text-center border transition-all ${p2QAnswer === 'syn2_b' ? 'border-purple-500 bg-purple-500/20 text-white' : 'border-slate-600 bg-slate-900 text-slate-400 hover:bg-slate-700'}`}>
                                            <span className="font-mono text-xl font-bold">k = cos(θ)</span>
                                        </button>
                                        <button onClick={() => setP2QAnswer('syn2_c')} className={`w-full p-4 rounded-xl text-center border transition-all ${p2QAnswer === 'syn2_c' ? 'border-purple-500 bg-purple-500/20 text-white' : 'border-slate-600 bg-slate-900 text-slate-400 hover:bg-slate-700'}`}>
                                            <span className="font-mono text-xl font-bold">k = tan(θ)</span>
                                        </button>
                                    </div>

                                    <button onClick={() => submitP2QuestionMulti(p2QAnswer === 'syn2_a', 'syn3', [
                                        `Look at the math box above. The slope k (${Math.sin(p2TargetThetaDeg * Math.PI/180).toFixed(3)}) is exactly equal to sin(${p2TargetThetaDeg}°).`,
                                        `Therefore, the constant k is sin(θ).`
                                    ])} disabled={!p2QAnswer || isChecking} className="w-full bg-purple-600 hover:bg-purple-500 disabled:opacity-50 text-white py-4 rounded-xl font-bold text-lg shadow-lg">Confirm Constant</button>
                                </>
                            )}

                            {p2Stage === 'syn3' && (
                                <>
                                    <h2 className="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-6 mt-4 text-center">The Grand Finale</h2>
                                    
                                    <div className="mb-6">
                                        <p className="text-slate-300 text-lg mb-2 text-center">Construct the final Master Equation by selecting the correct variables from the dropdowns below:</p>
                                        <div className="flex flex-col sm:flex-row items-center justify-center gap-3 text-2xl font-mono mt-6 bg-slate-900 p-6 rounded-xl border border-slate-700">
                                            <select value={syn3A} onChange={e => setSyn3A(e.target.value)} className="bg-slate-800 border border-slate-600 text-white rounded p-2 focus:outline-none focus:border-purple-500 text-center w-full sm:w-auto cursor-pointer">
                                                <option value="" disabled>?</option>
                                                <option value="lambda">λ</option>
                                                <option value="d">d</option>
                                                <option value="sin_theta">sin(θ)</option>
                                                <option value="cos_theta">cos(θ)</option>
                                            </select>
                                            <span className="text-white">=</span>
                                            <select value={syn3B} onChange={e => setSyn3B(e.target.value)} className="bg-slate-800 border border-slate-600 text-white rounded p-2 focus:outline-none focus:border-purple-500 text-center w-full sm:w-auto cursor-pointer">
                                                <option value="" disabled>?</option>
                                                <option value="lambda">λ</option>
                                                <option value="d">d</option>
                                                <option value="sin_theta">sin(θ)</option>
                                                <option value="cos_theta">cos(θ)</option>
                                            </select>
                                            <span className="text-white">·</span>
                                            <select value={syn3C} onChange={e => setSyn3C(e.target.value)} className="bg-slate-800 border border-slate-600 text-white rounded p-2 focus:outline-none focus:border-purple-500 text-center w-full sm:w-auto cursor-pointer">
                                                <option value="" disabled>?</option>
                                                <option value="lambda">λ</option>
                                                <option value="d">d</option>
                                                <option value="sin_theta">sin(θ)</option>
                                                <option value="cos_theta">cos(θ)</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="mb-8 pt-6 border-t border-slate-700">
                                        <p className="text-slate-300 text-lg mb-4 text-center">Now, algebraically rearrange your equation to solve for the <strong>separation distance (d)</strong>:</p>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                            <button onClick={() => setSyn3D('d_wrong1')} className={`p-4 rounded-xl text-center border transition-all ${syn3D === 'd_wrong1' ? 'border-purple-500 bg-purple-500/20 text-white' : 'border-slate-600 bg-slate-900 text-slate-400 hover:bg-slate-700'}`}>
                                                <span className="font-mono text-lg font-bold">d = λ · sin(θ)</span>
                                            </button>
                                            <button onClick={() => setSyn3D('d_correct')} className={`p-4 rounded-xl text-center border transition-all ${syn3D === 'd_correct' ? 'border-purple-500 bg-purple-500/20 text-white' : 'border-slate-600 bg-slate-900 text-slate-400 hover:bg-slate-700'}`}>
                                                <span className="font-mono text-lg font-bold">d = λ / sin(θ)</span>
                                            </button>
                                            <button onClick={() => setSyn3D('d_wrong2')} className={`p-4 rounded-xl text-center border transition-all ${syn3D === 'd_wrong2' ? 'border-purple-500 bg-purple-500/20 text-white' : 'border-slate-600 bg-slate-900 text-slate-400 hover:bg-slate-700'}`}>
                                                <span className="font-mono text-lg font-bold">d = sin(θ) / λ</span>
                                            </button>
                                            <button onClick={() => setSyn3D('d_wrong3')} className={`p-4 rounded-xl text-center border transition-all ${syn3D === 'd_wrong3' ? 'border-purple-500 bg-purple-500/20 text-white' : 'border-slate-600 bg-slate-900 text-slate-400 hover:bg-slate-700'}`}>
                                                <span className="font-mono text-lg font-bold">d = λ + sin(θ)</span>
                                            </button>
                                        </div>
                                    </div>

                                    <button onClick={handleSyn3Submit} disabled={!syn3A || !syn3B || !syn3C || !syn3D || isChecking} className="w-full bg-gradient-to-r from-blue-600 to-emerald-500 hover:from-blue-500 hover:to-emerald-400 disabled:opacity-50 text-white py-4 rounded-xl font-bold text-xl shadow-lg transform transition-all">Complete Synthesis Lab</button>
                                </>
                            )}
                            
                            {feedback && <div className={`mt-4 text-center text-sm p-3 rounded ${feedbackType === 'error' ? 'bg-amber-900/30 text-amber-300 border border-amber-500/30' : 'bg-emerald-900/30 text-emerald-300'}`}>{feedback}</div>}
                        </div>
                    )}

                    {/* Data Review Modal */}
                    {showDataReview && (
                        <div className="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-slate-800 border border-slate-600 rounded-2xl p-6 max-w-4xl w-full max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold text-white">Previous Experiment Data</h2>
                                    <button onClick={() => setShowDataReview(false)} className="text-slate-400 hover:text-white bg-slate-700 hover:bg-slate-600 rounded px-3 py-1">
                                        Close
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {/* Exp 1 Data View */}
                                    <div className="bg-slate-900 p-5 rounded-xl border border-slate-700">
                                        <h3 className="text-lg font-bold text-blue-400 mb-4 text-center">Exp 1: Fixed Angle (θ = {p2TargetThetaDeg}°)</h3>
                                        <SimpleGraph data={p2Data1} xKey="d" yKey="lambda" xLabel="Distance (d)" yLabel="Wavelength (λ)" title="" showTrendline={true} />
                                        <div className="text-center mt-2 text-sm text-slate-400">Slope (k) ≈ <span className="font-mono text-blue-400 font-bold">{calculatedSlope}</span></div>
                                        <table className="w-full text-xs text-center text-slate-400 mt-4">
                                            <thead className="uppercase bg-slate-800 text-slate-500"><tr><th className="px-2 py-2">Distance (d)</th><th className="px-2 py-2">Wavelength (λ)</th></tr></thead>
                                            <tbody>{p2Data1.map((d, i) => <tr key={i} className="border-b border-slate-800"><td className="px-2 py-2">{d.d.toFixed(1)}</td><td className="px-2 py-2">{d.lambda.toFixed(1)}</td></tr>)}</tbody>
                                        </table>
                                    </div>
                                    {/* Exp 2 Data View */}
                                    <div className="bg-slate-900 p-5 rounded-xl border border-slate-700">
                                        <h3 className="text-lg font-bold text-emerald-400 mb-4 text-center">Exp 2: Fixed Distance (d = {userD.toFixed(1)})</h3>
                                        <SimpleGraph data={p2Data2} xKey="thetaDeg" yKey="lambda" xLabel="Angle θ (degrees)" yLabel="Wavelength (λ)" title="" showTrendline={false} />
                                        <table className="w-full text-xs text-center text-slate-400 mt-4">
                                            <thead className="uppercase bg-slate-800 text-slate-500"><tr><th className="px-2 py-2">Angle (θ)</th><th className="px-2 py-2">Wavelength (λ)</th><th className="px-2 py-2">sin(θ)</th></tr></thead>
                                            <tbody>{p2Data2.map((d, i) => <tr key={i} className="border-b border-slate-800"><td className="px-2 py-2">{d.thetaDeg.toFixed(1)}°</td><td className="px-2 py-2">{d.lambda.toFixed(1)}</td><td className="px-2 py-2">{d.sinTheta.toFixed(3)}</td></tr>)}</tbody>
                                        </table>
                                    </div>
                                </div>
                                <div className="mt-6 flex justify-end">
                                    <button onClick={() => setShowDataReview(false)} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-bold shadow-lg">Return to Synthesis</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        lucide.createIcons();
    </script>
</body>
</html>
