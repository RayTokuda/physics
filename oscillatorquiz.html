<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics 14 Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800">

    <div id="app" class="min-h-screen"></div>

    <script>
        // --- MATH FORMATTING HELPERS ---
        const MathEq = (content) => `<span class="font-serif text-lg tracking-wide bg-gray-50 px-2 py-1 rounded border border-gray-200 shadow-sm mx-1">${content}</span>`;
        const Fraction = (num, den) => `<span class="inline-flex flex-col text-center align-middle text-sm mx-1" style="vertical-align: -0.5em;"><span class="border-b border-gray-800 pb-[1px]">${num}</span><span class="pt-[1px]">${den}</span></span>`;
        const Sqrt = (content) => `<span class="whitespace-nowrap">√<span class="border-t border-gray-800 pt-[1px] ml-[1px]">${content}</span></span>`;

        // --- QUIZ DATA ---
        const quizData = [
          {
            id: 1,
            title: "Oscillation on a Frictionless Surface",
            type: "mcq",
            animation: "two-springs",
            question: "A mass m is on a frictionless surface between two identical springs, both with spring constant K. Find the period of oscillation T in terms of m and K.",
            options: [
              { id: 'A', content: MathEq(`2π${Sqrt(Fraction('m', 'K'))}`), correct: false },
              { id: 'B', content: MathEq(`2π${Sqrt(Fraction('m', '2K'))}`), correct: true },
              { id: 'C', content: MathEq(`2π${Sqrt(Fraction('2m', 'K'))}`), correct: false },
              { id: 'D', content: MathEq(`π${Sqrt(Fraction('m', 'K'))}`), correct: false },
            ],
            tutorial: `
              <div class="space-y-3">
                <p>Let's derive this using <strong>Newton's 2nd Law</strong>.</p>
                <p>1. Displace the mass by a distance ${MathEq('x')} to the right.</p>
                <p>2. The right spring compresses (pushing left with ${MathEq('-Kx')}) and the left spring stretches (pulling left with ${MathEq('-Kx')}).</p>
                <p>3. Apply ${MathEq('F = ma')}:<br/>
                   ${MathEq(`-Kx - Kx = m${Fraction('d²x', 'dt²')}`)}
                </p>
                <p>4. Solve for acceleration ${MathEq(`a = ${Fraction('d²x', 'dt²')}`)}:<br/>
                   ${MathEq(`${Fraction('d²x', 'dt²')} = -${Fraction('2K', 'm')}x`)}
                </p>
                <p>5. In Simple Harmonic Motion, ${MathEq(`${Fraction('d²x', 'dt²')} = -ω²x`)}. So the coefficient of ${MathEq('-x')} is ${MathEq('ω²')}:<br/>
                   ${MathEq(`ω² = ${Fraction('2K', 'm')}`)}
                </p>
                <p>Since period ${MathEq(`T = ${Fraction('2π', 'ω')}`)}, taking the square root gives:<br/>
                   ${MathEq(`T = 2π${Sqrt(Fraction('m', '2K'))}`)}.
                </p>
              </div>`
          },
          {
            id: 2,
            title: "Simple Harmonic Motion Calculations",
            type: "numeric",
            animation: "standard-shm",
            question: "A 0.1 kg mass is undergoing simple harmonic motion with amplitude A = 10 cm and period T = 0.20 s.",
            inputs: [
              { id: 'force', label: 'a) What is the maximum force on the mass? (in N)', correctValue: 9.87, tolerance: 0.1 },
              { id: 'spring', label: 'b) What is the spring constant K? (in N/m)', correctValue: 98.7, tolerance: 1.0 }
            ],
            tutorial: `
              <div class="space-y-3">
                <p>Let's break down the SHM parameters:</p>
                <p>1. Find angular frequency ${MathEq('ω = 2π / T = 2π / 0.20 = 10π rad/s')}.</p>
                <p>2. Convert Amplitude to meters: ${MathEq('A = 0.1 m')}.</p>
                <p><strong>Part A (Force):</strong><br/>
                   Maximum acceleration is ${MathEq('a<sub>max</sub> = Aω² = (0.1)(100π²) ≈ 98.7 m/s²')}.<br/>
                   Maximum force ${MathEq('F<sub>max</sub> = m a<sub>max</sub> = (0.1 kg)(98.7 m/s²) = 9.87 N')}.
                </p>
                <p><strong>Part B (Spring Constant):</strong><br/>
                   We know ${MathEq(`ω = ${Sqrt('K/m')}`)}, so ${MathEq('K = mω²')}.<br/>
                   ${MathEq('K = (0.1)(100π²) ≈ 98.7 N/m')}.
                </p>
              </div>`
          },
          {
            id: 3,
            title: "Rolling Sphere Oscillator",
            type: "mcq",
            animation: "rolling-sphere",
            question: "A solid sphere (Mass M, Radius R) rolls without slipping while attached to a spring K at its center (r=0). Find the period T. (Hint: I = 2MR²/5)",
            options: [
              { id: 'A', content: MathEq(`2π${Sqrt(Fraction('M', 'K'))}`), correct: false },
              { id: 'B', content: MathEq(`2π${Sqrt(Fraction('2M', '5K'))}`), correct: false },
              { id: 'C', content: MathEq(`2π${Sqrt(Fraction('7M', '5K'))}`), correct: true },
              { id: 'D', content: MathEq(`2π${Sqrt(Fraction('5M', '7K'))}`), correct: false },
            ],
            tutorial: `
              <div class="space-y-3">
                <p>Let's use <strong>Newton's Second Law</strong> for translation and rotation.</p>
                <p>1. Translation (${MathEq('F = ma')}): The forces are the spring force and static friction (${MathEq('f<sub>s</sub>')}). <br/>
                   ${MathEq('-Kx - f<sub>s</sub> = Ma')}
                </p>
                <p>2. Rotation (${MathEq('τ = Iα')}): The spring attaches at the center (${MathEq('r=0')}), so only friction provides torque. <br/>
                   ${MathEq('f<sub>s</sub>R = Iα')}
                </p>
                <p>3. Use rolling without slipping (${MathEq('α = a/R')}) and ${MathEq('I = 2/5 MR²')}:<br/>
                   ${MathEq('f<sub>s</sub>R = (2/5 MR²)(a/R) → f<sub>s</sub> = 2/5 Ma')}
                </p>
                <p>4. Substitute ${MathEq('f<sub>s</sub>')} back into the translation equation:<br/>
                   ${MathEq('-Kx - 2/5 Ma = Ma → -Kx = 7/5 Ma')}
                </p>
                <p>5. Isolate acceleration to find the differential equation form ${MathEq('a = -ω²x')}:<br/>
                   ${MathEq(`a = -${Fraction('5K', '7M')}x`)}, so ${MathEq(`ω² = ${Fraction('5K', '7M')}`)}
                </p>
                <p>Period is ${MathEq(`T = ${Fraction('2π', 'ω')} = 2π${Sqrt(Fraction('7M', '5K'))}`)}.</p>
              </div>`
          },
          {
            id: 4,
            title: "Ballistic Spring Pendulum",
            type: "numeric",
            animation: "ballistic",
            question: "A 4.0 kg block rests on a frictionless surface attached to a spring (K = 500 N/m). A 50g bullet is fired at 150 m/s and embeds in the block.",
            inputs: [
              { id: 'amp', label: 'a) Find the amplitude of the resulting SHM (in m)', correctValue: 0.166, tolerance: 0.005 },
              { id: 'ke', label: 'b) What fraction of original KE is stored? (in %)', correctValue: 1.23, tolerance: 0.1 }
            ],
            tutorial: `
              <div class="space-y-3">
                <p>This is a two-part collision and energy problem.</p>
                <p><strong>1. Inelastic Collision (Momentum Conserved):</strong><br/>
                   ${MathEq('m<sub>bullet</sub>v<sub>i</sub> = (m<sub>bullet</sub> + M<sub>block</sub>)v<sub>f</sub>')}<br/>
                   ${MathEq('(0.05)(150) = (4.05)v<sub>f</sub> → v<sub>f</sub> ≈ 1.85 m/s')}.
                </p>
                <p><strong>2. Spring Compression (Energy Conserved):</strong><br/>
                   ${MathEq('1/2 (m+M)v<sub>f</sub>² = 1/2 KA²')}<br/>
                   ${MathEq('1/2 (4.05)(1.85)² = 1/2 (500)A² → 6.94 J = 250 A²')}<br/>
                   ${MathEq('A ≈ 0.166 m')}.
                </p>
                <p><strong>3. Kinetic Energy Fraction:</strong><br/>
                   Initial ${MathEq('KE = 1/2 (0.05)(150)² = 562.5 J')}.<br/>
                   Stored ${MathEq('KE')} (from part 2) ${MathEq('= 6.94 J')}.<br/>
                   Fraction ${MathEq('= 6.94 / 562.5 ≈ 0.0123 = 1.23%')}.
                </p>
              </div>`
          },
          {
            id: 5,
            title: "Physical Pendulum (Step-by-Step)",
            type: "multi-part-mcq",
            animation: "physical-pendulum",
            question: "A uniform rod of mass M and length L is pivoted at one end. Follow the steps to find its period of small oscillations.",
            parts: [
              {
                id: 'part1',
                label: 'Step 1: Use the Parallel Axis Theorem (I = I_cm + Md²) to find the moment of inertia I about the pivot. (Note: I_cm = 1/12 ML²)',
                options: [
                  { id: 'A', content: MathEq(`I = ${Fraction('1', '12')}ML²`), correct: false, feedback: "Incorrect. This is the moment of inertia about the center of mass, not the pivot." },
                  { id: 'B', content: MathEq(`I = ${Fraction('1', '4')}ML²`), correct: false, feedback: "Incorrect. You added M(L/4)², but the distance to the CM is L/2." },
                  { id: 'C', content: MathEq(`I = ${Fraction('1', '3')}ML²`), correct: true, feedback: "Correct! I = 1/12 ML² + M(L/2)² = 1/3 ML²." }
                ]
              },
              {
                id: 'part2',
                label: 'Step 2: What is the correct torque equation (τ = Iα) for this pendulum? (Let right be positive θ)',
                options: [
                  { id: 'A', content: MathEq('-MgL sin(θ) = Iα'), correct: false, feedback: "Incorrect. The distance from the pivot to the CM is L/2, not L." },
                  { id: 'B', content: MathEq(`-Mg${Fraction('L', '2')} sin(θ) = Iα`), correct: true, feedback: "Correct! Gravity acts at the CM." },
                  { id: 'C', content: MathEq(`Mg${Fraction('L', '2')} cos(θ) = Iα`), correct: false, feedback: "Incorrect. The perpendicular component of force uses sin(θ)." }
                ]
              },
              {
                id: 'part3',
                label: 'Step 3: Use the small angle approximation (sin θ ≈ θ) to turn this into the SHM differential equation form (d²θ/dt² = -ω²θ).',
                options: [
                  { id: 'A', content: MathEq(`${Fraction('d²θ', 'dt²')} = -${Fraction('3g', '2L')}θ`), correct: true, feedback: "Correct! Substituting I and simplifying gives this." },
                  { id: 'B', content: MathEq(`${Fraction('d²θ', 'dt²')} = -${Fraction('2g', '3L')}θ`), correct: false, feedback: "Incorrect. Check your fraction division: (1/2) / (1/3) = 3/2." },
                  { id: 'C', content: MathEq(`${Fraction('d²θ', 'dt²')} = -${Fraction('g', 'L')}θ`), correct: false, feedback: "Incorrect. This is for a simple pendulum." }
                ]
              },
              {
                id: 'part4',
                label: 'Step 4: Using ω² from the previous step, what is the period T?',
                options: [
                  { id: 'A', content: MathEq(`T = 2π${Sqrt(Fraction('L', 'g'))}`), correct: false, feedback: "Incorrect. This is for a simple pendulum." },
                  { id: 'B', content: MathEq(`T = 2π${Sqrt(Fraction('2L', '3g'))}`), correct: true, feedback: "Correct! T = 2π/ω, so you invert the fraction." },
                  { id: 'C', content: MathEq(`T = 2π${Sqrt(Fraction('3L', '2g'))}`), correct: false, feedback: "Incorrect. You forgot to invert ω² when dividing." }
                ]
              }
            ],
            tutorial: `
              <div class="space-y-3">
                <p><strong>Step 1:</strong> The center of mass is at ${MathEq('d = L/2')}. By Parallel Axis Theorem:<br/>
                   ${MathEq(`I = ${Fraction('1', '12')}ML² + M(L/2)² = ${Fraction('1', '12')}ML² + ${Fraction('3', '12')}ML² = ${Fraction('1', '3')}ML²`)}.
                </p>
                <p><strong>Step 2:</strong> Gravity acts at the CM (distance L/2 from pivot), creating a restoring torque:<br/>
                   ${MathEq('τ = -Mg(L/2)sin(θ) = Iα')}.
                </p>
                <p><strong>Step 3:</strong> Small angles mean ${MathEq('sin(θ) ≈ θ')}. Substitute ${MathEq('I')} and ${MathEq(`α = ${Fraction('d²θ', 'dt²')}`)}:<br/>
                   ${MathEq(`-Mg${Fraction('L', '2')}θ = (${Fraction('1', '3')}ML²)${Fraction('d²θ', 'dt²')}`)}<br/>
                   ${MathEq(`${Fraction('d²θ', 'dt²')} = -${Fraction('MgL/2', 'ML²/3')}θ = -${Fraction('3g', '2L')}θ`)}.
                </p>
                <p><strong>Step 4:</strong> The coefficient is ${MathEq(`ω² = ${Fraction('3g', '2L')}`)}. Period is ${MathEq(`T = ${Fraction('2π', 'ω')} = 2π${Sqrt(Fraction('2L', '3g'))}`)}.</p>
              </div>`
          },
          {
            id: 6,
            title: "Oscillator Through the Earth",
            type: "multi-part-mcq",
            animation: "earth-hole",
            question: "A hole is drilled from the North pole to the South pole of a uniform Earth (Mass M, Radius R). A mass m is dropped in. Follow the steps to find its period.",
            parts: [
              {
                id: 'part1',
                label: 'Step 1: What is the gravitational force F_g on the mass when it is at distance r from the center? (Assume uniform density)',
                options: [
                  { id: 'A', content: MathEq(`F = -G${Fraction('Mm', 'r²')}`), correct: false, feedback: "Incorrect. That's for a point mass or outside a sphere." },
                  { id: 'B', content: MathEq(`F = -G${Fraction('Mm', 'R³')}r`), correct: true, feedback: "Correct! Force scales linearly with r inside a uniform sphere." },
                  { id: 'C', content: MathEq(`F = -mg`), correct: false, feedback: "Incorrect. Gravity g is not constant inside the Earth." }
                ]
              },
              {
                id: 'part2',
                label: 'Step 2: Use Newton\'s 2nd Law (F = ma) to write the differential equation for the position r(t).',
                options: [
                  { id: 'A', content: MathEq(`${Fraction('d²r', 'dt²')} = -${Fraction('GM', 'R³')}r`), correct: true, feedback: "Correct! F = ma gives this exact differential equation." },
                  { id: 'B', content: MathEq(`${Fraction('d²r', 'dt²')} = -${Fraction('g', 'r')}`), correct: false, feedback: "Incorrect. The units don't align here." },
                  { id: 'C', content: MathEq(`${Fraction('d²r', 'dt²')} = -${Fraction('GM', 'r²')}`), correct: false, feedback: "Incorrect. This implies acceleration increases as you get closer to the center." }
                ]
              },
              {
                id: 'part3',
                label: 'Step 3: Identify ω² from your differential equation, noting that surface gravity g = GM/R².',
                options: [
                  { id: 'A', content: MathEq(`ω² = ${Fraction('R', 'g')}`), correct: false, feedback: "Incorrect. You've inverted it." },
                  { id: 'B', content: MathEq(`ω² = ${Fraction('g', 'R')}`), correct: true, feedback: "Correct! Substitute GM/R³ = g/R." },
                  { id: 'C', content: MathEq(`ω² = ${Fraction('GM', 'R')}`), correct: false, feedback: "Incorrect. Dimensional analysis fails here." }
                ]
              },
              {
                id: 'part4',
                label: 'Step 4: What is the period T of this oscillation?',
                options: [
                  { id: 'A', content: MathEq(`T = 2π${Sqrt(Fraction('R', 'g'))}`), correct: true, feedback: "Correct! About 84 minutes." },
                  { id: 'B', content: MathEq(`T = 2π${Sqrt(Fraction('g', 'R'))}`), correct: false, feedback: "Incorrect. T = 2π/ω, so you must flip the fraction." },
                  { id: 'C', content: MathEq(`T = 2π${Sqrt(Fraction('R³', 'GMm'))}`), correct: false, feedback: "Incorrect. m cancels out in Step 2." }
                ]
              }
            ],
            tutorial: `
              <div class="space-y-3">
                <p><strong>Step 1:</strong> Inside a uniform sphere, the gravitational force is proportional to the distance from the center ${MathEq('r')} (only the mass "inside" ${MathEq('r')} pulls it down):<br/>
                   ${MathEq(`F = -G${Fraction('Mm_{inside}', 'r²')} = -G${Fraction('M(r³/R³)', 'r²')}m = -G${Fraction('Mm', 'R³')}r`)}.
                </p>
                <p><strong>Step 2:</strong> Set ${MathEq('F = m a')} where ${MathEq(`a = ${Fraction('d²r', 'dt²')}`)}:<br/>
                   ${MathEq(`-G${Fraction('Mm', 'R³')}r = m${Fraction('d²r', 'dt²')} → ${Fraction('d²r', 'dt²')} = -${Fraction('GM', 'R³')}r`)}.
                </p>
                <p><strong>Step 3:</strong> Comparing this to ${MathEq(`${Fraction('d²r', 'dt²')} = -ω²r`)}, we see ${MathEq(`ω² = ${Fraction('GM', 'R³')}`)}. Since surface gravity ${MathEq(`g = ${Fraction('GM', 'R²')}`)}, we can simplify to ${MathEq(`ω² = ${Fraction('g', 'R')}`)}.</p>
                <p><strong>Step 4:</strong> The period is ${MathEq(`T = ${Fraction('2π', 'ω')} = 2π${Sqrt(Fraction('R', 'g'))}`)}. (This evaluates to about 84 minutes!)</p>
              </div>`
          },
          {
            id: 7,
            title: "Resonance on the Expressway",
            type: "multi-part-mcq",
            animation: "unicycle",
            question: "The main expressway is constructed out of pavement slabs with seams that are 43 meters apart. When you ride your powered unicycle at 27 m/s, it develops noticeable resonance vibrations. If the payload of the single suspension spring is 100 kg, follow the steps to find the spring constant k.",
            parts: [
              {
                id: 'part1',
                label: 'Step 1: Resonance occurs when the driving frequency matches the natural frequency. What is the period T of the driving force (time between hitting seams)?',
                options: [
                  { id: 'A', content: MathEq(`T = 1161 s`), correct: false, feedback: "Incorrect. You multiplied distance by speed. Use t = d/v." },
                  { id: 'B', content: MathEq(`T = 0.63 s`), correct: false, feedback: "Incorrect. You divided speed by distance. Use t = d/v." },
                  { id: 'C', content: MathEq(`T = 1.59 s`), correct: true, feedback: "Correct! T = d/v = 43 / 27 ≈ 1.593 s." }
                ]
              },
              {
                id: 'part2',
                label: 'Step 2: What is the natural angular frequency ω of the unicycle suspension?',
                options: [
                  { id: 'A', content: MathEq(`ω = 3.95 rad/s`), correct: true, feedback: "Correct! ω = 2π / T = 2π / 1.593 ≈ 3.945 rad/s." },
                  { id: 'B', content: MathEq(`ω = 10.0 rad/s`), correct: false, feedback: "Incorrect. You used ω = 2πT instead of 2π/T." },
                  { id: 'C', content: MathEq(`ω = 0.25 rad/s`), correct: false, feedback: "Incorrect. You used ω = T/2π instead of 2π/T." }
                ]
              },
              {
                id: 'part3',
                label: 'Step 3: Using the payload mass m = 100 kg, find the spring constant k from ω = √(k/m).',
                options: [
                  { id: 'A', content: MathEq(`k = 395 N/m`), correct: false, feedback: "Incorrect. You multiplied m by ω. It should be mω²." },
                  { id: 'B', content: MathEq(`k = 1557 N/m`), correct: true, feedback: "Correct! k = mω² = 100 × (3.945)² ≈ 1557 N/m." },
                  { id: 'C', content: MathEq(`k = 15.6 N/m`), correct: false, feedback: "Incorrect. You divided ω² by m instead of multiplying." }
                ]
              }
            ],
            tutorial: `
              <div class="space-y-3">
                <p><strong>Step 1:</strong> The time between bumps is the period of the driving force. Using velocity ${MathEq('v = d/t')}:<br/>
                   ${MathEq(`T = ${Fraction('d', 'v')} = ${Fraction('43 m', '27 m/s')} ≈ 1.5926 s`)}.
                </p>
                <p><strong>Step 2:</strong> Resonance occurs when the driving period matches the natural period. We convert this to angular frequency:<br/>
                   ${MathEq(`ω = ${Fraction('2π', 'T')} = ${Fraction('2π', '1.5926')} ≈ 3.945 rad/s`)}.
                </p>
                <p><strong>Step 3:</strong> The natural frequency of a spring-mass system is ${MathEq(`ω = ${Sqrt('k/m')}`)}. Solving for k:<br/>
                   ${MathEq('k = mω² = 100 × (3.945)² = 100 × 15.567 ≈ 1557 N/m')}.</p>
              </div>`
          }
        ];

        // --- APP STATE ---
        let state = {
            view: 'welcome', // welcome, quiz, summary
            currentQIndex: 0,
            answers: {},
            selectedMcq: null,
            multiMcqAnswers: {},
            multiPartStatus: {},
            showTutorial: false,
            isCorrect: null
        };

        let animationFrameId = null;

        // --- RENDER LOGIC ---
        function render() {
            const app = document.getElementById('app');
            
            if (state.view === 'welcome') {
                app.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center p-4">
                        <div class="bg-white rounded-2xl shadow-xl p-8 max-w-lg w-full text-center space-y-6">
                            <div class="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto text-blue-600">
                                <i data-lucide="book-open" class="w-10 h-10"></i>
                            </div>
                            <h1 class="text-3xl font-bold text-slate-800">Physics 14 Practice</h1>
                            <p class="text-slate-600 text-lg">
                                Master Simple Harmonic Motion, Oscillators, and Ballistic Pendulums. 
                                Interactive animations and tutorials included!
                            </p>
                            <button onclick="startQuiz()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition-transform transform hover:scale-105 flex items-center justify-center">
                                Start Practice Quiz <i data-lucide="arrow-right" class="ml-2 w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                `;
            } else if (state.view === 'summary') {
                const score = Object.values(state.answers).filter(a => a.isCorrect).length;
                let questionsHtml = quizData.map((q, idx) => `
                    <div class="bg-white p-6 rounded-2xl shadow-md border-l-4 border-blue-500">
                        <div class="flex items-start justify-between">
                            <div>
                                <h3 class="text-lg font-bold text-slate-800 mb-2">Q${idx + 1}: ${q.title}</h3>
                                <p class="text-slate-700 mb-4">${q.question}</p>
                            </div>
                            ${state.answers[q.id]?.isCorrect ? 
                                '<i data-lucide="check-circle" class="text-green-500 shrink-0 w-7 h-7"></i>' : 
                                '<i data-lucide="x-circle" class="text-red-500 shrink-0 w-7 h-7"></i>'
                            }
                        </div>
                        <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 mb-4">
                            <h4 class="font-semibold text-slate-700 flex items-center mb-2">
                                <i data-lucide="calculator" class="mr-2 w-4 h-4"></i> Step-by-Step Solution
                            </h4>
                            <div class="text-slate-600 text-sm">${q.tutorial}</div>
                        </div>
                    </div>
                `).join('');

                app.innerHTML = `
                    <div class="min-h-screen bg-slate-50 p-6 md:p-12">
                        <div id="summary-document" class="max-w-4xl mx-auto space-y-8">
                            <div class="bg-white p-8 rounded-2xl shadow-lg text-center">
                                <h1 class="text-4xl font-extrabold text-slate-800 mb-2 flex justify-center items-center">
                                    <i data-lucide="file-text" class="mr-3 text-blue-600 w-10 h-10"></i>
                                    Final Submission Document
                                </h1>
                                <p class="text-xl text-slate-600">You scored ${score} out of ${quizData.length}</p>
                                <div id="summary-actions" class="mt-6 flex flex-col sm:flex-row items-center justify-center gap-4">
                                    <button onclick="startQuiz()" class="bg-slate-200 hover:bg-slate-300 text-slate-800 font-semibold py-2 px-6 rounded-lg transition-colors flex items-center">
                                        <i data-lucide="refresh-ccw" class="mr-2 w-4 h-4"></i> Restart Practice
                                    </button>
                                    <button onclick="downloadHTML()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition-colors flex items-center">
                                        <i data-lucide="download" class="mr-2 w-4 h-4"></i> Download as HTML
                                    </button>
                                </div>
                            </div>
                            <div class="space-y-6">${questionsHtml}</div>
                        </div>
                    </div>
                `;
            } else if (state.view === 'quiz') {
                const currentQ = quizData[state.currentQIndex];
                const progressPct = Math.round(((state.currentQIndex) / quizData.length) * 100);
                
                let inputsHtml = '';
                if (currentQ.type === 'mcq') {
                    inputsHtml = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${currentQ.options.map(opt => {
                            const isSelected = state.selectedMcq === opt.id;
                            const classes = isSelected ? 'border-blue-500 bg-blue-50 shadow-md' : 'border-slate-200 hover:border-blue-300 bg-white';
                            const disabledClass = state.isCorrect !== null ? 'opacity-70 cursor-not-allowed' : '';
                            return `<button onclick="selectMcq('${opt.id}')" ${state.isCorrect !== null ? 'disabled' : ''} class="p-4 rounded-xl border-2 text-left transition-all ${classes} ${disabledClass}">
                                <span class="font-bold mr-3 text-slate-400">${opt.id}.</span>${opt.content}
                            </button>`;
                        }).join('')}
                    </div>`;
                } else if (currentQ.type === 'numeric') {
                    inputsHtml = `<div class="space-y-4">
                        ${currentQ.inputs.map(input => `
                            <div class="flex flex-col md:flex-row md:items-center justify-between bg-slate-50 p-4 rounded-xl border border-slate-200">
                                <label class="text-slate-700 font-medium mb-2 md:mb-0">${input.label}</label>
                                <input type="number" step="any" id="num-input-${input.id}" ${state.isCorrect !== null ? 'disabled' : ''} class="p-2 border-2 border-slate-300 rounded-lg focus:border-blue-500 outline-none transition-colors w-full md:w-32 text-center" placeholder="e.g. 10.5" />
                            </div>
                        `).join('')}
                    </div>`;
                } else if (currentQ.type === 'multi-part-mcq') {
                    inputsHtml = `<div class="space-y-6">
                        ${currentQ.parts.map(part => {
                            const status = state.multiPartStatus[part.id];
                            const isPartCheckedAndCorrect = status === 'correct';
                            const selectedId = state.multiMcqAnswers[part.id];
                            const selectedOpt = part.options.find(o => o.id === selectedId);
                            
                            const containerClass = isPartCheckedAndCorrect ? 'border-green-200 bg-green-50/30' : 'border-slate-200 bg-slate-50';
                            
                            return `
                                <div class="p-5 rounded-xl border-2 ${containerClass}">
                                    <p class="font-bold text-slate-800 mb-3">${part.label}</p>
                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
                                        ${part.options.map(opt => {
                                            const isSelected = selectedId === opt.id;
                                            const btnClass = isSelected ? 'border-blue-500 bg-blue-100 shadow-sm' : 'border-slate-300 hover:border-blue-300 bg-white';
                                            const disabledClass = (state.isCorrect !== null || isPartCheckedAndCorrect) ? 'opacity-70 cursor-not-allowed' : '';
                                            const correctClass = (isPartCheckedAndCorrect && opt.correct) ? 'border-green-500 bg-green-100' : '';
                                            return `
                                                <button onclick="selectMultiMcq('${part.id}', '${opt.id}')" ${(state.isCorrect !== null || isPartCheckedAndCorrect) ? 'disabled' : ''} class="p-3 rounded-lg border-2 text-center transition-all ${btnClass} ${disabledClass} ${correctClass}">
                                                    ${opt.content}
                                                </button>
                                            `;
                                        }).join('')}
                                    </div>
                                    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
                                        <button onclick="checkPart('${part.id}')" ${(!selectedId || isPartCheckedAndCorrect || state.isCorrect !== null) ? 'disabled' : ''} class="bg-slate-700 hover:bg-slate-800 disabled:bg-slate-300 text-white font-semibold py-2 px-4 rounded-lg text-sm transition-colors">
                                            Check Step
                                        </button>
                                        ${(status && selectedOpt) ? `
                                            <div class="text-sm font-medium p-3 rounded-lg flex-1 w-full ${status === 'correct' ? 'text-green-800 bg-green-100 border border-green-200' : 'text-red-800 bg-red-100 border border-red-200'}">
                                                <i data-lucide="${status === 'correct' ? 'check-circle' : 'x-circle'}" class="inline mr-1 w-4 h-4"></i> ${selectedOpt.feedback}
                                            </div>
                                        ` : ''}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>`;
                }

                let actionHtml = '';
                if (state.isCorrect === null) {
                    if (currentQ.type === 'multi-part-mcq') {
                        actionHtml = `<div class="text-slate-500 italic text-sm text-center w-full sm:w-auto p-3">Complete all steps to continue.</div>`;
                    } else {
                        actionHtml = `<button onclick="checkAnswer()" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-sm transition-colors">Check Answer</button>`;
                    }
                } else {
                    const isLast = state.currentQIndex >= quizData.length - 1;
                    actionHtml = `<button onclick="nextQuestion()" class="w-full sm:w-auto bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-8 rounded-xl shadow-md transition-transform hover:scale-105 flex items-center justify-center">
                        ${isLast ? 'Finish & View Document' : 'Next Question'} <i data-lucide="chevron-right" class="ml-2 w-5 h-5"></i>
                    </button>`;
                }

                let feedbackHtml = '';
                if (state.isCorrect === true) {
                    feedbackHtml = `<div class="flex items-center text-green-600 bg-green-50 p-3 rounded-lg border border-green-200"><i data-lucide="check-circle" class="mr-2 w-5 h-5"></i> <span class="font-semibold">Correct! Great job.</span></div>`;
                } else if (state.isCorrect === false) {
                    feedbackHtml = `<div class="flex items-center text-red-600 bg-red-50 p-3 rounded-lg border border-red-200"><i data-lucide="x-circle" class="mr-2 w-5 h-5"></i> <span class="font-semibold">Not quite right. Let's look at the tutorial.</span></div>`;
                }

                let tutorialHtml = '';
                if (state.showTutorial) {
                    tutorialHtml = `
                        <div class="bg-amber-50 border-l-4 border-amber-500 p-6 rounded-r-2xl shadow-md animate-fade-in-up">
                            <h3 class="text-amber-800 font-bold text-lg mb-3 flex items-center">
                                <i data-lucide="book-open" class="mr-2 w-5 h-5"></i> Instructor Tutorial
                            </h3>
                            <div class="text-amber-900 leading-relaxed">${currentQ.tutorial}</div>
                            ${state.isCorrect === false ? `<button onclick="retryQuestion()" class="mt-4 bg-amber-200 hover:bg-amber-300 text-amber-900 font-semibold py-2 px-4 rounded-lg transition-colors text-sm">Try Again</button>` : ''}
                        </div>
                    `;
                }

                app.innerHTML = `
                    <div class="p-4 md:p-8 flex flex-col items-center">
                        <div class="max-w-3xl w-full">
                            <!-- Progress Bar -->
                            <div class="mb-6 flex items-center justify-between text-sm font-medium text-slate-500">
                                <span>Question ${state.currentQIndex + 1} of ${quizData.length}</span>
                                <div class="flex-1 mx-4 h-2 bg-slate-200 rounded-full overflow-hidden">
                                    <div class="h-full bg-blue-500 transition-all duration-500" style="width: ${progressPct}%"></div>
                                </div>
                                <span>${progressPct}%</span>
                            </div>

                            <!-- Main Card -->
                            <div class="bg-white rounded-2xl shadow-xl overflow-hidden mb-6 border border-slate-200">
                                <div class="bg-slate-800 p-4 text-white">
                                    <h2 class="text-xl font-bold">${currentQ.title}</h2>
                                </div>
                                <div class="p-6 space-y-6">
                                    <p class="text-lg text-slate-800 leading-relaxed">${currentQ.question}</p>
                                    
                                    <div id="animation-container"></div>
                                    
                                    ${inputsHtml}

                                    <div class="pt-4 border-t border-slate-100 flex flex-col sm:flex-row items-center justify-between gap-4">
                                        <div class="flex-1 w-full">${feedbackHtml}</div>
                                        ${actionHtml}
                                    </div>
                                </div>
                            </div>
                            
                            ${tutorialHtml}
                        </div>
                    </div>
                `;

                // Restart Animation
                startAnimation(currentQ.animation);
            }

            // Initialize icons for the newly rendered HTML
            lucide.createIcons();
        }

        // --- ANIMATION CONTROLLER ---
        function startAnimation(type) {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            const container = document.getElementById('animation-container');
            if (!container) return;

            const animate = (t) => {
                const time = t / 1000;
                const centerX = 200;
                const baseY = 100;
                let svgContent = '';

                if (type === 'two-springs') {
                    const x = 50 * Math.sin(3 * time);
                    svgContent = `
                        <svg viewBox="0 0 400 200" class="w-full h-48 bg-blue-50 rounded-lg shadow-inner">
                            <line x1="20" y1="120" x2="380" y2="120" stroke="#475569" stroke-width="4" />
                            <rect x="10" y="40" width="20" height="80" fill="#334155" />
                            <rect x="370" y="40" width="20" height="80" fill="#334155" />
                            <path d="M 30 ${baseY} Q ${(centerX + x + 30)/2} ${baseY + 20} ${centerX - 25 + x} ${baseY}" fill="none" stroke="#94A3B8" stroke-width="4" stroke-dasharray="5 5" />
                            <path d="M ${centerX + 25 + x} ${baseY} Q ${(370 + centerX + x)/2} ${baseY - 20} 370 ${baseY}" fill="none" stroke="#94A3B8" stroke-width="4" stroke-dasharray="5 5" />
                            <rect x="${centerX - 25 + x}" y="${baseY - 25}" width="50" height="45" fill="#3B82F6" rx="4" />
                            <text x="${centerX + x}" y="${baseY + 5}" fill="white" text-anchor="middle" font-weight="bold">m</text>
                        </svg>
                    `;
                } else if (type === 'standard-shm') {
                    const x = 60 * Math.sin(4 * time);
                    svgContent = `
                        <svg viewBox="0 0 400 200" class="w-full h-48 bg-blue-50 rounded-lg shadow-inner">
                            <line x1="20" y1="120" x2="380" y2="120" stroke="#475569" stroke-width="4" />
                            <rect x="40" y="40" width="20" height="80" fill="#334155" />
                            <path d="M 60 ${baseY} Q ${(centerX + x + 60)/2} ${baseY + 20} ${centerX - 30 + x} ${baseY}" fill="none" stroke="#94A3B8" stroke-width="4" stroke-dasharray="5 5" />
                            <rect x="${centerX - 30 + x}" y="${baseY - 25}" width="60" height="45" fill="#EF4444" rx="4" />
                            <text x="${centerX + x}" y="${baseY + 5}" fill="white" text-anchor="middle" font-weight="bold">10kg</text>
                            <line x1="${centerX}" y1="130" x2="${centerX}" y2="150" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4 4"/>
                            <text x="${centerX}" y="165" fill="#64748B" text-anchor="middle" font-size="12">x=0</text>
                        </svg>
                    `;
                } else if (type === 'rolling-sphere') {
                    const x = 60 * Math.sin(2.5 * time);
                    const rotation = (x / 25) * (180 / Math.PI);
                    svgContent = `
                        <svg viewBox="0 0 400 200" class="w-full h-48 bg-blue-50 rounded-lg shadow-inner">
                            <line x1="20" y1="125" x2="380" y2="125" stroke="#475569" stroke-width="4" />
                            <rect x="40" y="40" width="20" height="85" fill="#334155" />
                            <path d="M 60 ${baseY} L ${centerX + x} ${baseY}" fill="none" stroke="#94A3B8" stroke-width="3" stroke-dasharray="4 4" />
                            <g transform="translate(${centerX + x}, ${baseY}) rotate(${rotation})">
                                <circle cx="0" cy="0" r="25" fill="#F59E0B" />
                                <circle cx="0" cy="0" r="23" fill="none" stroke="#B45309" stroke-width="2" />
                                <line x1="-25" y1="0" x2="25" y2="0" stroke="#B45309" stroke-width="2" />
                                <line x1="0" y1="-25" x2="0" y2="25" stroke="#B45309" stroke-width="2" />
                            </g>
                        </svg>
                    `;
                } else if (type === 'ballistic') {
                    const cycleTime = time % 4;
                    let bulletX = -10;
                    let blockX = centerX;
                    
                    if (cycleTime < 1) {
                        bulletX = -10 + (centerX - (-10)) * cycleTime;
                    } else {
                        bulletX = centerX - 15 + 40 * Math.sin(4 * (cycleTime - 1));
                        blockX = centerX + 40 * Math.sin(4 * (cycleTime - 1));
                    }
                    svgContent = `
                        <svg viewBox="0 0 400 200" class="w-full h-48 bg-blue-50 rounded-lg shadow-inner overflow-hidden">
                            <line x1="20" y1="125" x2="380" y2="125" stroke="#475569" stroke-width="4" />
                            <rect x="340" y="40" width="20" height="85" fill="#334155" />
                            <path d="M ${blockX + 25} ${baseY} L 340 ${baseY}" fill="none" stroke="#94A3B8" stroke-width="4" stroke-dasharray="5 5" />
                            <rect x="${blockX - 25}" y="${baseY - 25}" width="50" height="50" fill="#10B981" rx="4" />
                            <text x="${blockX}" y="${baseY + 5}" fill="white" text-anchor="middle" font-weight="bold">M</text>
                            ${cycleTime < 1 ? 
                                `<rect x="${bulletX}" y="${baseY - 5}" width="20" height="10" fill="#475569" rx="2" />` : 
                                `<circle cx="${bulletX + 15}" cy="${baseY}" r="5" fill="#1E293B" />`
                            }
                        </svg>
                    `;
                } else if (type === 'physical-pendulum') {
                    const theta = 25 * Math.sin(3 * time);
                    svgContent = `
                        <svg viewBox="0 0 400 200" class="w-full h-48 bg-blue-50 rounded-lg shadow-inner">
                            <line x1="150" y1="30" x2="250" y2="30" stroke="#475569" stroke-width="4" />
                            <g transform="translate(${centerX}, 30) rotate(${theta})">
                                <rect x="-6" y="0" width="12" height="130" fill="#64748B" rx="6" />
                                <circle cx="0" cy="0" r="4" fill="#F87171" />
                                <circle cx="0" cy="65" r="4" fill="#38BDF8" />
                            </g>
                            <text x="100" y="25" fill="#64748B" font-size="12">Pivot</text>
                        </svg>
                    `;
                } else if (type === 'earth-hole') {
                    const y = 70 * Math.sin(2.5 * time);
                    svgContent = `
                        <svg viewBox="0 0 400 200" class="w-full h-48 bg-blue-50 rounded-lg shadow-inner overflow-hidden">
                            <circle cx="${centerX}" cy="${baseY}" r="85" fill="#BFDBFE" stroke="#3B82F6" stroke-width="2" />
                            <line x1="${centerX}" y1="15" x2="${centerX}" y2="185" stroke="#EFF6FF" stroke-width="12" />
                            <line x1="${centerX}" y1="15" x2="${centerX}" y2="185" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4 4" />
                            <circle cx="${centerX}" cy="${baseY + y}" r="8" fill="#EF4444" />
                            <text x="${centerX + 100}" y="${baseY + 5}" fill="#1E3A8A" font-weight="bold">Earth</text>
                        </svg>
                    `;
                } else if (type === 'unicycle') {
                    const speed = 150;
                    const seamSpacing = 120;
                    const offset = (speed * time) % seamSpacing;
                    const bounceFreq = speed / seamSpacing;
                    const yOffset = 15 * Math.sin(bounceFreq * time * 2 * Math.PI);
                    
                    const lines = [-seamSpacing, 0, seamSpacing, seamSpacing*2, seamSpacing*3].map(pos => 
                        `<line x1="${pos - offset + 200}" y1="155" x2="${pos - offset + 200}" y2="165" stroke="#1E293B" stroke-width="4" />`
                    ).join('');

                    svgContent = `
                        <svg viewBox="0 0 400 200" class="w-full h-48 bg-blue-50 rounded-lg shadow-inner overflow-hidden">
                            <line x1="0" y1="160" x2="400" y2="160" stroke="#475569" stroke-width="4" />
                            ${lines}
                            <g transform="translate(${centerX}, ${130 + yOffset})">
                                <circle cx="0" cy="0" r="30" fill="none" stroke="#334155" stroke-width="6" />
                                <circle cx="0" cy="0" r="4" fill="#1E293B" />
                                <line x1="0" y1="0" x2="0" y2="-40" stroke="#94A3B8" stroke-width="6" />
                                <path d="M -10 -40 Q 15 -50 -10 -60 Q 15 -70 -10 -80 L 0 -80 L 0 -90" fill="none" stroke="#3B82F6" stroke-width="4" />
                                <rect x="-20" y="-100" width="40" height="10" fill="#EF4444" rx="4" />
                            </g>
                        </svg>
                    `;
                }

                container.innerHTML = svgContent;
                animationFrameId = requestAnimationFrame(animate);
            };
            animationFrameId = requestAnimationFrame(animate);
        }

        // --- ACTIONS ---
        function startQuiz() {
            state.view = 'quiz';
            state.currentQIndex = 0;
            state.answers = {};
            resetQuestionState();
            render();
        }

        function resetQuestionState() {
            state.selectedMcq = null;
            state.numericInputs = {};
            state.multiMcqAnswers = {};
            state.multiPartStatus = {};
            state.showTutorial = false;
            state.isCorrect = null;
        }

        function selectMcq(id) {
            if (state.isCorrect !== null) return;
            state.selectedMcq = id;
            render();
        }

        function selectMultiMcq(partId, optId) {
            if (state.isCorrect !== null || state.multiPartStatus[partId] === 'correct') return;
            state.multiMcqAnswers[partId] = optId;
            state.multiPartStatus[partId] = null;
            render();
        }

        function checkPart(partId) {
            const selected = state.multiMcqAnswers[partId];
            if (!selected) return;
            
            const currentQ = quizData[state.currentQIndex];
            const part = currentQ.parts.find(p => p.id === partId);
            const opt = part.options.find(o => o.id === selected);
            
            state.multiPartStatus[partId] = opt.correct ? 'correct' : 'incorrect';
            
            // Auto check if all are correct
            const allCorrect = currentQ.parts.every(p => state.multiPartStatus[p.id] === 'correct');
            if (allCorrect && state.isCorrect === null) {
                state.isCorrect = true;
                state.answers[currentQ.id] = { isCorrect: true, userAnswer: state.multiMcqAnswers };
            }

            render();
        }

        function checkAnswer() {
            const currentQ = quizData[state.currentQIndex];
            let correct = false;

            if (currentQ.type === 'mcq') {
                if (!state.selectedMcq) return alert("Please select an option");
                const selectedOption = currentQ.options.find(o => o.id === state.selectedMcq);
                correct = selectedOption.correct;
            } else if (currentQ.type === 'numeric') {
                let allCorrect = true;
                for (const input of currentQ.inputs) {
                    const el = document.getElementById(`num-input-${input.id}`);
                    const userVal = parseFloat(el.value);
                    if (isNaN(userVal)) {
                        allCorrect = false;
                        break;
                    }
                    const diff = Math.abs(userVal - input.correctValue);
                    if (diff > input.tolerance) {
                        allCorrect = false;
                    }
                    // save input state so it doesn't wipe on re-render if wrong
                    state.numericInputs[input.id] = el.value;
                }
                // Check if all inputs were filled out
                correct = allCorrect && Object.keys(state.numericInputs).length === currentQ.inputs.length;
                if(Object.keys(state.numericInputs).length !== currentQ.inputs.length) {
                    return alert("Please fill out all inputs");
                }
            }

            state.isCorrect = correct;
            state.answers[currentQ.id] = {
                isCorrect: correct,
                userAnswer: currentQ.type === 'mcq' ? state.selectedMcq : { ...state.numericInputs }
            };

            if (!correct) {
                state.showTutorial = true;
            }
            render();

            // Re-populate numeric inputs if it was wrong so they don't lose their typing
            if (currentQ.type === 'numeric') {
                for (const key in state.numericInputs) {
                    const el = document.getElementById(`num-input-${key}`);
                    if (el) el.value = state.numericInputs[key];
                }
            }
        }

        function retryQuestion() {
            resetQuestionState();
            render();
        }

        function nextQuestion() {
            if (state.currentQIndex < quizData.length - 1) {
                state.currentQIndex++;
                resetQuestionState();
            } else {
                state.view = 'summary';
            }
            render();
        }

        function downloadHTML() {
            const summaryElement = document.getElementById('summary-document');
            if (!summaryElement) return;

            const clone = summaryElement.cloneNode(true);
            const actionsDiv = clone.querySelector('#summary-actions');
            if (actionsDiv) actionsDiv.remove();

            const htmlContent = `
                <!DOCTYPE html>
                <html lang="en">
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>Physics 14 Practice - Results</title>
                    <script src="https://cdn.tailwindcss.com"><\/script>
                    <script src="https://unpkg.com/lucide@latest"><\/script>
                </head>
                <body class="bg-slate-50 p-6 md:p-12 font-sans text-slate-800">
                    ${clone.outerHTML}
                    <script>lucide.createIcons();<\/script>
                </body>
                </html>
            `;

            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Physics_Quiz_Results.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Initialize App
        render();

    </script>
</body>
</html>
