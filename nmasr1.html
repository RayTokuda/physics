                id: 'q11', title: 'Question 11',
                images: [
                    'https://docs.google.com/drawings/d/e/2PACX-1vQwM5swRs7VgwR7qWjf5ecACZXH64GVrVSfUna74gg407sM_0xti1a-KJOnHUnQKuP0NNo62H4Mlo4p/pub?w=960&h=720',
                    'https://docs.google.com/drawings/d/e/2PACX-1vS4BdCyJEZp6n5jSg5sxEn4cGmMDsdZkyvYRKUJg7CRG8TEeTfAcSbd39_OCanUPhnJ4WB-yk_73Eik/pub?w=960&h=720'
                ],
                text: landUseStimulus,
                parts: [
                    {
                        id: 'q11a', type: 'mcq',
                        prompt: 'A logging company is choosing a logging method to selectively cut an area of forest. The company wants to use a method that will reduce human impact and stabilize the amount of erosion in the area. Based on the Soil Disturbance from Logging table, which method should the logging company use?',
                        options: [
                            'Method 3, because removing fewer trees will result in a smaller increase in erosion than method 1.', 
                            'Method 3, because clearing less land for roads will result in a smaller increase in erosion than method 1.', 
                            'Method 1, because not using land to store logs will result in a smaller increase in erosion than method 3.', 
                            'Method 1, because leaving less soil bare after logging will result in a smaller increase in erosion than method 3.'
                        ],
                        answer: 1, explanation: 'Method 1 and 3 are the selective cut options. Method 3 causes significantly less disturbance from road building (6.0) compared to Method 1 (14.1).'
                    }
                ]
            },
            {
                id: 'q12', title: 'Question 12',
                images: [
                    'https://docs.google.com/drawings/d/e/2PACX-1vQwM5swRs7VgwR7qWjf5ecACZXH64GVrVSfUna74gg407sM_0xti1a-KJOnHUnQKuP0NNo62H4Mlo4p/pub?w=960&h=720',
                    'https://docs.google.com/drawings/d/e/2PACX-1vS4BdCyJEZp6n5jSg5sxEn4cGmMDsdZkyvYRKUJg7CRG8TEeTfAcSbd39_OCanUPhnJ4WB-yk_73Eik/pub?w=960&h=720'
                ],
                text: landUseStimulus + '<p class="mt-4 text-slate-700">The logging company decides to clearcut the forest near the student’s home.</p>',
                parts: [
                    {
                        id: 'q12a', type: 'mcq',
                        prompt: 'Part a\nBased on information in the tables, which logging method and land use is most likely to reduce the human impact on the ecosystem near the student’s home?',
                        options: [
                            'Clearcut with Method 2 and then plant tree crops with ground cover.', 
                            'Clearcut with Method 4 and then plant tree crops with ground cover.', 
                            'Clearcut with Method 2 and then plant rotating food crops with ground cover.', 
                            'Clearcut with Method 4 and then plant rotating food crops with ground cover.'
                        ],
                        answer: 1, explanation: 'Method 4 clearcutting has a much lower total soil disturbance (8.9) than Method 2 (19.1). Additionally, planting tree crops with ground cover yields the lowest post-logging erosion rate (5.60).'
                    },
                    {
                        id: 'q12b', type: 'mcq',
                        prompt: 'Part b\nWhich statement describes a reason for the answer to Part (a)?',
                        options: [
                            'This logging method and land use will result in less bare soil and less erosion.', 
                            'This logging method and land use will result in more bare soil but less erosion.', 
                            'This logging method and land use will result in the smallest increase in bare soil and erosion.', 
                            'This logging method and land use will result in the largest decrease in bare soil and erosion.'
                        ],
                        answer: 2, explanation: 'Since any logging inherently disturbs soil compared to undisturbed nature, the goal is to choose the method resulting in the smallest increase in bare soil and erosion.'
                    }
                ]
            }
        ];

        // --- STATE ---
        let currentIndex = 0;
        let userAnswers = {};
        let aiGradingResult = { score: 0, feedback: '' };

        const appContainer = document.getElementById('app-container');

        // --- RENDER FUNCTIONS ---
        function renderApp() {
            if (currentIndex < testData.length) {
                renderQuestion();
            } else {
                renderGradingScreen();
            }
        }

        function renderQuestion() {
            const q = testData[currentIndex];
            
            let imagesHtml = q.images && q.images.length > 0 ? q.images.map(img => `<img src="${img}" class="max-h-56 sm:max-h-64 object-contain rounded border border-slate-200 shadow-sm" alt="Question Resource">`).join('') : '';
            
            let partsHtml = q.parts.map(part => {
                if (part.type === 'mcq') {
                    let optionsHtml = part.options.map((opt, i) => {
                        const isSelected = userAnswers[part.id] === i;
                        return `
                            <label class="block p-4 border rounded-lg cursor-pointer transition-all hover:bg-slate-50 ${isSelected ? 'selected-option' : 'border-slate-200'}"
                                   onclick="handleSelect('${part.id}', ${i})">
                                <div class="flex items-start">
                                    <input type="radio" name="${part.id}" class="w-4 h-4 mt-1 text-blue-600 border-slate-300 focus:ring-blue-500" ${isSelected ? 'checked' : ''}>
                                    <span class="ml-3 text-slate-700 font-medium whitespace-pre-wrap">${opt}</span>
                                </div>
                            </label>
                        `;
                    }).join('');
                    
                    return `
                        <div class="mb-8 fade-in">
                            <h3 class="text-lg font-semibold text-slate-800 mb-3 whitespace-pre-wrap">${part.prompt}</h3>
                            <div class="space-y-3">${optionsHtml}</div>
                        </div>
                    `;
                } else if (part.type === 'open') {
                    const currentVal = userAnswers[part.id] || '';
                    return `
                        <div class="mb-8 fade-in">
                            <h3 class="text-lg font-semibold text-slate-800 mb-3 whitespace-pre-wrap">${part.prompt}</h3>
                            <textarea id="${part.id}" rows="5" class="w-full p-4 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-slate-700 shadow-sm" placeholder="Type your detailed explanation here..." oninput="handleText('${part.id}', this.value)">${currentVal}</textarea>
                        </div>
                    `;
                }
            }).join('');

            const progressPct = ((currentIndex) / testData.length) * 100;

            appContainer.innerHTML = `
                <div class="w-full h-2 bg-slate-100 shrink-0">
                    <div class="h-full bg-blue-500 transition-all duration-300" style="width: ${progressPct}%"></div>
                </div>
                <div class="p-6 sm:p-8 flex-grow overflow-y-auto">
                    <div class="mb-4 text-sm font-bold text-blue-600 tracking-wider uppercase">Question ${currentIndex + 1} of ${testData.length}</div>
                    
                    ${imagesHtml ? `<div class="flex flex-wrap gap-4 justify-center mb-6 bg-slate-50 p-4 rounded-xl border border-slate-100">${imagesHtml}</div>` : ''}
                    
                    <div class="text-slate-600 mb-8 leading-relaxed">${q.text}</div>
                    ${partsHtml}
                </div>
                <div class="p-4 sm:p-6 bg-slate-50 border-t border-slate-200 flex justify-between items-center shrink-0">
                    <button onclick="prevQuestion()" class="${currentIndex === 0 ? 'invisible' : ''} px-4 sm:px-6 py-2.5 rounded-lg font-medium text-slate-600 hover:bg-slate-200 transition-colors">Previous</button>
                    <button onclick="nextQuestion()" class="px-4 sm:px-6 py-2.5 rounded-lg font-medium text-white bg-blue-600 hover:bg-blue-700 shadow-md transition-colors">
                        ${currentIndex === testData.length - 1 ? 'Submit Test' : 'Next Question'}
                    </button>
                </div>
            `;
        }

        async function renderGradingScreen() {
            appContainer.innerHTML = `
                <div class="flex-grow flex flex-col items-center justify-center p-12 text-center fade-in">
                    <svg class="w-16 h-16 text-blue-500 animate-spin mb-6" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <h2 class="text-2xl font-bold text-slate-800 mb-2">Grading your responses...</h2>
                    <p class="text-slate-500">Our AI is currently evaluating your open-ended responses for Question 4.</p>
                </div>
            `;

            await gradeQuestion4();
            renderScoreScreen();
        }

        async function gradeQuestion4() {
            const ansA = userAnswers['q4a'] || "No answer provided.";
            const ansB = userAnswers['q4b'] || "No answer provided.";

            const prompt = `Student Answer Part A (Decrease CO2): ${ansA}\nStudent Answer Part B (Constraint): ${ansB}`;
            
            const systemInstruction = `You are an expert high school chemistry teacher grading an assessment on Le Chatelier's Principle in ocean water.
The student was asked to: 
a. Describe one way students could decrease the amount of CO2 in ocean water by applying Le Chatelier's principle (using the equation CO2 + H2O + CaCO3 <-> Ca2+ + 2H+ + 2CO3 2-).
b. Describe one constraint on implementing the change described in Part (a).

Score out of 4 total points based on this rubric:
4 points: Thoroughly describes a way to decrease CO2 (e.g., adding CaCO3 or removing Ca2+ to shift reaction to products) AND describes a valid constraint (cost, materials, scaling, testing, environmental impact). Explanation is coherent and accurate.
3 points: Sufficient use, but may lack some detail or contain minor errors.
2 points: Limited use, lacks multiple details or contains major errors.
1 point: Minimal use or only answers one part very briefly.
0 points: Inaccurate, irrelevant, or blank.

You MUST return your grade in ONLY a raw JSON format exactly like this:
{"score": <number>, "feedback": "<your explanation of the grade>"}
Do not include markdown blocks. Return only the JSON object.`;

            try {
                const response = await fetch('/api/gemini', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, systemInstruction })
                });

                if (!response.ok) throw new Error('API fetch failed');

                const data = await response.json();
                const cleanText = data.text.replace(/```json/g, '').replace(/```/g, '').trim();
                const parsed = JSON.parse(cleanText);
                
                aiGradingResult.score = typeof parsed.score === 'number' ? parsed.score : 0;
                aiGradingResult.feedback = parsed.feedback || "Feedback parsed incorrectly.";

            } catch (error) {
                console.warn("Backend API not found or failed. Using Mock Grading fallback.", error);
                
                let mockScore = 0;
                let mockFeedback = "<strong>(Code Preview Fallback Grading)</strong><br/>";
                const lowerA = ansA.toLowerCase();
                const lowerB = ansB.toLowerCase();

                // Rubric Logic for A (Le Chatelier shift to products to decrease CO2)
                if (lowerA.includes('add') || lowerA.includes('remove') || lowerA.includes('shift') || lowerA.includes('right') || lowerA.includes('calcium') || lowerA.includes('carbonate') || lowerA.includes('products')) {
                    mockScore += 1;
                    mockFeedback += "- Identified a method to shift equilibrium towards products (+1).<br/>";
                }
                if (lowerA.includes('consume') || lowerA.includes('decrease') || lowerA.length > 30) {
                    mockScore += 1;
                    mockFeedback += "- Logically explained how the shift decreases CO2 (+1).<br/>";
                }
                // Rubric Logic for B (Constraints)
                if (lowerB.includes('cost') || lowerB.includes('money') || lowerB.includes('scale') || lowerB.includes('hard') || lowerB.includes('materials') || lowerB.includes('energy') || lowerB.includes('test')) {
                    mockScore += 1;
                    mockFeedback += "- Identified a valid real-world constraint such as cost or scale (+1).<br/>";
                }
                
                // Cohesion bonus
                if (mockScore === 3 && (ansA.length + ansB.length) > 80) {
                    mockScore += 1;
                    mockFeedback += "- Provided a coherent, accurate, and complete explanation covering all parts (+1).<br/>";
                }

                // Minimums
                if(mockScore === 0 && (ansA.length > 5 || ansB.length > 5)){
                    mockScore = 1; 
                    mockFeedback += "- Minimal/Partial attempt (+1).";
                } else if (ansA === "No answer provided." && ansB === "No answer provided.") {
                    mockFeedback += "- No attempt made (0).";
                }

                aiGradingResult.score = mockScore;
                aiGradingResult.feedback = mockFeedback;
            }
        }

        function calculateMCQScore() {
            let score = 0;
            testData.forEach(q => {
                q.parts.forEach(part => {
                    if (part.type === 'mcq') {
                        if (userAnswers[part.id] === part.answer) {
                            score += 1;
                        }
                    }
                });
            });
            return score;
        }

        function renderScoreScreen() {
            const mcqScore = calculateMCQScore(); // 18 points total
            const totalScore = mcqScore + aiGradingResult.score;
            const maxScore = 22; // 18 MCQ + 4 AI
            const missedPoints = maxScore - totalScore;

            appContainer.innerHTML = `
                <div class="flex-grow flex flex-col items-center justify-center p-8 sm:p-12 text-center fade-in bg-white">
                    <div class="w-32 h-32 rounded-full border-8 border-slate-100 flex items-center justify-center mb-4 relative">
                        <svg class="absolute inset-0 w-full h-full text-blue-500" style="transform: rotate(-90deg);" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="46" fill="none" stroke="currentColor" stroke-width="8" stroke-dasharray="289" stroke-dashoffset="${289 - (289 * totalScore / maxScore)}"></circle>
                        </svg>
                        <span class="text-4xl font-bold text-slate-800">${totalScore}<span class="text-xl text-slate-400">/22</span></span>
                    </div>
                    
                    <div class="mb-8">
                        <p class="text-xs text-slate-500 uppercase tracking-widest font-semibold mb-1">Exercise Name: NM ASR Practice Test - Session 1</p>
                        <p class="text-xs text-slate-400">Verification Code: <span class="font-mono font-bold text-slate-600">${VERIFICATION_CODE}</span></p>
                    </div>
                    
                    <h2 class="text-3xl font-bold text-slate-800 mb-2">Test Completed!</h2>
                    <p class="text-slate-600 mb-8 max-w-md">You scored ${mcqScore} points on the multiple choice, and ${aiGradingResult.score}/4 on the AI-graded chemistry question.</p>
                    
                    <div class="bg-blue-50 border border-blue-100 rounded-xl p-6 mb-8 w-full max-w-2xl text-left">
                        <h4 class="font-bold text-blue-800 mb-2">AI Feedback (Question 4 - Le Chatelier's Principle):</h4>
                        <p class="text-blue-900 text-sm leading-relaxed">${aiGradingResult.feedback}</p>
                    </div>

                    <button onclick="downloadStudyGuide()" class="flex items-center gap-2 px-8 py-3 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg transition-transform transform hover:scale-105">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Download Study Guide
                    </button>
                </div>
            `;

            if (missedPoints === 0) {
                shootBallistic(3);
            } else if (missedPoints === 1) {
                shootBallistic(2);
            } else if (missedPoints === 2) {
                shootBallistic(1);
            }
        }

        // --- INTERACTION LOGIC ---
        window.handleSelect = (partId, optionIndex) => {
            userAnswers[partId] = optionIndex;
            renderApp();
        };

        window.handleText = (partId, value) => {
            userAnswers[partId] = value;
        };

        window.nextQuestion = () => {
            // Increment the index unconditionally, as renderApp handles the boundary logic
            currentIndex++;
            renderApp();
        };

        window.prevQuestion = () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderApp();
            }
        };

        // --- CONFETTI LOGIC ---
        function shootBallistic(bursts) {
            let count = 0;
            const interval = setInterval(() => {
                confetti({ particleCount: 80, spread: 60, origin: { y: 1, x: 0.1 }, angle: 60, velocity: 70, zIndex: 100 });
                confetti({ particleCount: 80, spread: 60, origin: { y: 1, x: 0.9 }, angle: 120, velocity: 70, zIndex: 100 });
                count++;
                if (count >= bursts) clearInterval(interval);
            }, 800);
        }

        // --- STUDY GUIDE GENERATION ---
        window.downloadStudyGuide = () => {
            let htmlContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>NM ASR Study Guide</title>
                    <style>
                        body { font-family: system-ui, sans-serif; line-height: 1.6; color: #333; max-w: 800px; margin: 40px auto; padding: 20px; }
                        h1 { color: #1e40af; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; }
                        .question { background: #f9fafb; border: 1px solid #e5e7eb; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
                        .prompt { font-weight: bold; margin-bottom: 10px; white-space: pre-wrap; }
                        .correct { color: #15803d; font-weight: bold; }
                        .incorrect { color: #b91c1c; font-weight: bold; }
                        .explanation { background: #eff6ff; padding: 10px; border-left: 4px solid #3b82f6; margin-top: 10px; font-size: 0.9em; }
                        .ai-feedback { background: #fdf2f8; padding: 10px; border-left: 4px solid #db2777; margin-top: 10px; font-size: 0.9em; }
                        .verification { text-align: center; margin-top: 40px; font-size: 0.8em; color: #6b7280; }
                    </style>
                </head>
                <body>
                    <h1>NM ASR Practice - Study Guide & Review</h1>
                    <p>Review your answers and the explanations below to improve your understanding.</p>
            `;

            testData.forEach((q, index) => {
                htmlContent += `<div class="question"><h2>${q.title}</h2>`;
                
                if(['q5', 'q6', 'q7', 'q8'].includes(q.id)) {
                    if (q.id === 'q5') {
                        htmlContent += `<div><em>(See Carbon in the Oceans stimulus text from the test)</em></div>`;
                    }
                } else if (['q9', 'q10', 'q11', 'q12'].includes(q.id)) {
                    if (q.id === 'q9') {
                         htmlContent += `<div><em>(See Land Use and Erosion stimulus text from the test)</em></div>`;
                    }
                } else {
                     htmlContent += `<div><em>${q.text}</em></div>`;
                }
                
                q.parts.forEach(part => {
                    htmlContent += `<div style="margin-top:20px;"><div class="prompt">${part.prompt}</div>`;
                    
                    if (part.type === 'mcq') {
                        const userAnsIndex = userAnswers[part.id];
                        const userAnsText = userAnsIndex !== undefined ? part.options[userAnsIndex] : "No answer selected";
                        const correctAnsText = part.options[part.answer];
                        const isCorrect = userAnsIndex === part.answer;

                        htmlContent += `
                            <p>Your Answer: <span class="${isCorrect ? 'correct' : 'incorrect'}">${userAnsText}</span></p>
                            ${!isCorrect ? `<p>Correct Answer: <span class="correct">${correctAnsText}</span></p>` : ''}
                            <div class="explanation"><strong>Explanation:</strong> ${part.explanation}</div>
                        `;
                    } else if (part.type === 'open') {
                        const userText = userAnswers[part.id] || "No answer provided.";
                        htmlContent += `<p>Your Answer:</p><blockquote>${userText}</blockquote>`;
                        
                        // Add AI feedback only after the last part of Q4
                        if (part.id === 'q4b') {
                            htmlContent += `<div class="ai-feedback"><strong>AI Grading Feedback (Score: ${aiGradingResult.score}/4):</strong><br/>${aiGradingResult.feedback}</div>`;
                        }
                    }
                    htmlContent += `</div>`;
                });
                htmlContent += `</div>`;
            });

            htmlContent += `
                    <div class="verification">
                        Exercise Name: NM ASR Practice Test - Session 1<br/>
                        Verification Code: ${VERIFICATION_CODE}
                    </div>
                </body>
                </html>
            `;

            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `NM_ASR_Study_Guide_${VERIFICATION_CODE}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        // --- INIT ---
        renderApp();
    </script>
</body>
</html>
