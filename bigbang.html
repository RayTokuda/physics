        /* Drag and Drop Styles */
        .draggable-list { list-style-type: none; padding: 0; }
        .draggable-item { 
            background: white; border: 2px solid #d1d5db; border-radius: 0.5rem; 
            padding: 1rem; margin-bottom: 0.5rem; cursor: grab; display: flex; align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); transition: border-color 0.2s;

        .draggable-item:active { cursor: grabbing; border-color: #3b82f6; }
        .draggable-item.dragging { opacity: 0.5; background: #eff6ff; }
        .drag-handle { margin-right: 1rem; color: #9ca3af; cursor: grab; }

        /* Dropdown Inline Styles */
        .inline-dd {
            appearance: none; background-color: #fff; border: 2px solid #cbd5e1; border-radius: 0.375rem;
            padding: 0.25rem 2rem 0.25rem 0.75rem; color: #0f172a; font-weight: 600; cursor: pointer;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em;
        }
        .inline-dd:focus { outline: none; border-color: #3b82f6; ring: 2px; }

        /* Custom Radio Buttons */
        .radio-container { display: block; position: relative; padding-left: 2.5rem; margin-bottom: 1rem; cursor: pointer; user-select: none; font-size: 1.1rem;}
        .radio-container input { position: absolute; opacity: 0; cursor: pointer; }
        .checkmark { position: absolute; top: 0.15rem; left: 0; height: 1.5rem; width: 1.5rem; background-color: #fff; border: 2px solid #9ca3af; border-radius: 50%; }
        .radio-container:hover input ~ .checkmark { border-color: #3b82f6; }
        .radio-container input:checked ~ .checkmark { background-color: #3b82f6; border-color: #3b82f6; }
        .checkmark:after { content: ""; position: absolute; display: none; }
        .radio-container input:checked ~ .checkmark:after { display: block; }
        .radio-container .checkmark:after { top: 0.35rem; left: 0.35rem; width: 0.65rem; height: 0.65rem; border-radius: 50%; background: white; }

        .correct-anim { animation: pulseGreen 1s; }
        .incorrect-anim { animation: shakeRed 0.5s; }
        @keyframes pulseGreen { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        @keyframes shakeRed { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }

    <script>
        /* --- 15 SPECIFIC TOPICS WITH 6 HAND-CRAFTED VARIATIONS EACH --- */
        const coreTopics = [
            {
                topic: "Cosmic Expansion & Redshift",
                stim: "Astronomers observing distant galaxies note that the spectral lines of the light they emit are shifted toward the red end of the electromagnetic spectrum. Edwin Hubble discovered that the further away a galaxy is, the greater this shift appears to be.",
                theory: "Redshift occurs because the fabric of space itself is expanding. As light travels through expanding space, its wavelength is stretched. Hubble's Law provides primary evidence that the universe is expanding from an initial dense state (the Big Bang).",
                vars: [
                    { type: 'mc2', qA: "What conclusion about the universe is drawn from observing galactic redshift?", optA: ["The universe is static and infinite.", "Galaxies are shrinking in size.", "The universe is expanding.", "Galaxies are moving toward Earth."], ansA: 2, qB: "Which piece of evidence directly supports this conclusion?", optB: ["The proportional lengthening of light waves from distant objects.", "The uniform temperature of the cosmic microwave background.", "The specific ratio of hydrogen to helium.", "The energy released during nuclear fusion."], ansB: 0 },
                    { type: 'mc2', qA: "If a newly discovered galaxy is found to have a more extreme redshift than Galaxy Andromeda, what can be inferred?", optA: ["It is older than Andromeda.", "It is closer to Earth than Andromeda.", "It is moving toward Earth faster than Andromeda.", "It is farther away from Earth than Andromeda."], ansA: 3, qB: "Why does extreme redshift correlate with distance?", optB: ["Older light degrades into red wavelengths over time.", "Light from further objects has traveled through more expanding space.", "More distant galaxies have lower temperatures.", "Distant galaxies consist of different elements."], ansB: 1 },
                    { type: 'dd', text: "The phenomenon where light waves from a galaxy are stretched out is known as {0}. This stretching indicates that the galaxy is moving {1} us, supporting the theory that space is {2}.", options: [["blueshift", "redshift", "mass defect"], ["toward", "parallel to", "away from"], ["contracting", "static", "expanding"]], ans: [1, 2, 2] },
                    { type: 'dd', text: "Edwin Hubble observed that the {0} a galaxy is from Earth, the {1} its spectral lines are shifted to the red. This established a direct relationship between distance and {2}.", options: [["larger", "older", "farther"], ["less", "more", "randomly"], ["recessional velocity", "stellar mass", "core temperature"]], ans: [2, 1, 0] },
                    { type: 'order', text: "Trace the logical steps astronomers use to determine the universe is expanding:", items: [{id:"A", text:"Capture light spectra from distant galaxies using telescopes."}, {id:"B", text:"Identify known elemental absorption lines in the spectra."}, {id:"C", text:"Measure how far these lines are shifted toward the red end."}, {id:"D", text:"Correlate the shift with distance to formulate Hubble's Law."}], correctOrder: ["A", "B", "C", "D"] },
                    { type: 'order', text: "Order the following objects from LEAST redshifted to MOST redshifted based on Hubble's observations:", items: [{id:"A", text:"A star within our own Milky Way galaxy"}, {id:"B", text:"The nearby Andromeda Galaxy"}, {id:"C", text:"A moderately distant galaxy cluster"}, {id:"D", text:"The most distant observable quasar"}], correctOrder: ["A", "B", "C", "D"] }
                ]
            },
            {
                topic: "The Cosmic Microwave Background (CMB)",
                stim: "In 1965, scientists detected a faint, uniform microwave radiation coming from all directions in the sky. This radiation has a temperature of approximately 2.7 Kelvin and is not associated with any specific star or galaxy.",
                theory: "The CMB is the 'afterglow' of the Big Bang. About 380,000 years after the initial expansion, the universe cooled enough for neutral atoms to form, allowing the first light to travel freely. This light has stretched into the microwave spectrum due to cosmic expansion.",
                vars: [
                    { type: 'mc2', qA: "What is the origin of the Cosmic Microwave Background?", optA: ["Light emitted by the very first generation of stars.", "Radiation left over from the hot, dense early universe.", "Energy released by massive black holes in the ancient past.", "Microwaves produced by interstellar dust clouds."], ansA: 1, qB: "What specific characteristic of the CMB provides evidence for the Big Bang model?", optB: ["It is found only in the centers of dense galaxy clusters.", "It is expanding rapidly away from Earth.", "It is nearly uniform in temperature in all directions.", "It demonstrates a precise 3:1 ratio of hydrogen to helium."], ansB: 2 },
                    { type: 'mc2', qA: "Why is the CMB observed in the microwave spectrum today, rather than as visible light?", optA: ["It was originally emitted as microwaves.", "Cosmic dust absorbed all the visible light.", "The expansion of space stretched the light waves over billions of years.", "The universe has heated up, shifting the spectrum."], ansA: 2, qB: "Which concept explains this stretching of light?", optB: ["Cosmic Redshift", "Nuclear Fusion", "Mass Defect", "Hydrostatic Equilibrium"], ansB: 0 },
                    { type: 'dd', text: "The CMB is the oldest observable {0} in the universe. It was released when the early universe cooled enough to allow the formation of {1}, changing the universe from opaque to {2}.", options: [["matter", "light", "gravity"], ["black holes", "neutral atoms", "supernovae"], ["transparent", "static", "contracting"]], ans: [1, 1, 0] },
                    { type: 'dd', text: "Because the CMB is detected coming from {0} with a nearly uniform temperature of roughly {1}, it proves the universe was once in a highly {2} state.", options: [["only the galactic core", "all directions in space", "nearby stars"], ["10 million Kelvin", "2.7 Kelvin", "Absolute Zero"], ["cold and empty", "hot and dense", "stable and static"]], ans: [1, 1, 1] },
                    { type: 'order', text: "Order the timeline of events that led to the CMB we observe today:", items: [{id:"A", text:"The Big Bang initiates a rapid expansion of a hot, dense singularity."}, {id:"B", text:"The universe cools to ~3000K, allowing electrons to bind to protons."}, {id:"C", text:"The first photons are able to travel freely through space."}, {id:"D", text:"Expansion stretches these ancient photons into microwaves."}], correctOrder: ["A", "B", "C", "D"] },
                    { type: 'order', text: "Order these cosmic phenomena by their age, from OLDEST (happened first) to YOUNGEST (happened most recently):", items: [{id:"A", text:"The Big Bang singularity"}, {id:"B", text:"Emission of the Cosmic Microwave Background"}, {id:"C", text:"Formation of the first stars"}, {id:"D", text:"Formation of the Earth and Solar System"}], correctOrder: ["A", "B", "C", "D"] }
                ]
            },
            {
                topic: "Primordial Abundance (Hydrogen to Helium)",
                stim: "Astronomers observing pristine gas clouds (uncontaminated by stellar explosions) consistently find that the elemental mass of the universe is composed of roughly 75% Hydrogen and 25% Helium.",
                theory: "During the first few minutes after the Big Bang, the universe was hot enough for fusion to occur everywhere. It quickly expanded and cooled, freezing the elemental ratio at roughly 3 parts Hydrogen to 1 part Helium before any stars existed.",
                vars: [
                    { type: 'mc2', qA: "What does the 75% Hydrogen to 25% Helium mass ratio represent?", optA: ["The elements created inside a main sequence star.", "The elements dispersed by a supernova explosion.", "The primordial abundance created in the early universe.", "The composition of Earth's atmosphere."], ansA: 2, qB: "Why did the early universe stop fusing Hydrogen into heavier elements after just a few minutes?", optB: ["It ran out of Hydrogen fuel.", "Rapid expansion caused the temperature and pressure to drop too low.", "The first stars formed and absorbed all the energy.", "Gravity overpowered the fusion reactions."], ansB: 1 },
                    { type: 'mc2', qA: "If scientists found a primordial gas cloud that was 50% Hydrogen and 50% Helium, how would it affect the Big Bang theory?", optA: ["It would support the theory perfectly.", "It would contradict Big Bang nucleosynthesis models.", "It would prove that stars were present in the cloud.", "It would show the cloud was formed by a supernova."], ansA: 1, qB: "What exact ratio is predicted by Big Bang models and confirmed by current observations?", optB: ["1:1 (50% H, 50% He)", "3:1 (75% H, 25% He)", "10:1 (90% H, 10% He)", "No specific ratio is predicted."], ansB: 1 },
                    { type: 'dd', text: "Big Bang {0} occurred during the first few minutes of the universe. The extreme heat acted like the core of a star, fusing protons into {1}. The rapid expansion quickly halted this process, resulting in a 3:1 mass ratio of {2}.", options: [["Redshift", "Nucleosynthesis", "Hydrostatic Equilibrium"], ["Carbon", "Helium", "Iron"], ["Helium to Carbon", "Hydrogen to Helium", "Matter to Antimatter"]], ans: [1, 1, 1] },
                    { type: 'dd', text: "The universe's pristine gas is composed of roughly {0} Hydrogen and {1} Helium. This specific ratio could not have been produced solely by {2}, confirming it happened during the Big Bang.", options: [["25%", "50%", "75%"], ["25%", "50%", "75%"], ["supernovae", "stellar fusion", "black holes"]], ans: [2, 0, 1] },
                    { type: 'order', text: "Order the events of Big Bang Nucleosynthesis:", items: [{id:"A", text:"Universe is a soup of isolated protons and neutrons."}, {id:"B", text:"Temperature allows protons and neutrons to fuse into Helium nuclei."}, {id:"C", text:"Rapid expansion causes the universe to cool drastically."}, {id:"D", text:"Fusion stops, freezing the mass ratio at 75% Hydrogen, 25% Helium."}], correctOrder: ["A", "B", "C", "D"] },
                    { type: 'order', text: "Order the following atomic structures by when they first appeared in the universe:", items: [{id:"A", text:"Quarks and individual Protons (Hydrogen nuclei)"}, {id:"B", text:"Helium nuclei (2 protons, 2 neutrons)"}, {id:"C", text:"Neutral atoms (electrons orbiting nuclei)"}, {id:"D", text:"Carbon and Oxygen nuclei (forged in stars)"}], correctOrder: ["A", "B", "C", "D"] }
                ]
            },
            {
                topic: "Nebula to Protostar Formation",
                stim: "Vast, cold clouds of interstellar gas and dust, known as nebulae, are the birthplaces of stars. Over time, regions within these clouds begin to collapse inward, growing denser and hotter until a protostar forms.",
                theory: "Star formation is driven by gravity. Gravity pulls matter inwards, converting gravitational potential energy into kinetic and thermal energy. As the core compresses, the temperature and pressure rise dramatically until they are high enough to ignite nuclear fusion.",
                vars: [
                    { type: 'mc2', qA: "Which fundamental force is directly responsible for the collapse of a nebula into a protostar?", optA: ["Electromagnetism", "The Strong Nuclear Force", "Gravity", "Radiation Pressure"], ansA: 2, qB: "As the nebula collapses under this force, what happens to the core of the cloud?", optB: ["It gets cooler and less dense.", "It expands outward, creating a planetary nebula.", "It transforms entirely into heavy elements.", "Its temperature and pressure increase drastically."], ansB: 3 },
                    { type: 'mc2', qA: "What marks the transition from a collapsing cloud of gas into a true 'protostar'?", optA: ["The ignition of nuclear fusion.", "The formation of a dense, glowing, heating core.", "The explosion of the outer layers.", "The creation of planetary bodies."], ansA: 1, qB: "Why does the protostar's temperature rise as it shrinks?", optB: ["Nuclear fusion is already occurring.", "Gravitational potential energy is converted to thermal energy.", "Friction from nearby stars heats it up.", "It absorbs the cosmic microwave background."], ansB: 1 },
                    { type: 'dd', text: "A star begins its life in a {0}. As {1} pulls the gas and dust together, the material loses potential energy and gains {2} energy, causing the core to heat up.", options: [["black hole", "nebula", "supernova"], ["magnetism", "gravity", "fusion"], ["nuclear", "chemical", "thermal"]], ans: [1, 1, 2] },
                    { type: 'dd', text: "Before a star can ignite, the collapsing gas forms a {0}. It continues to shrink and heat up until the core reaches approximately {1}, the threshold required for {2} to begin.", options: [["white dwarf", "protostar", "neutron star"], ["10 million Kelvin", "2.7 Kelvin", "1000 degrees Celsius"], ["nuclear fusion", "radioactive decay", "redshift"]], ans: [1, 0, 0] },
                    { type: 'order', text: "Order the stages of early star formation:", items: [{id:"A", text:"A cold, diffuse nebula of gas and dust drifts in space."}, {id:"B", text:"Gravity causes a region of the nebula to begin collapsing."}, {id:"C", text:"The collapsing core becomes dense, opaque, and heats up (Protostar)."}, {id:"D", text:"Core temperature reaches 10 million K, igniting fusion."}], correctOrder: ["A", "B", "C", "D"] },
                    { type: 'order', text: "Trace the flow of energy during the formation of a protostar:", items: [{id:"A", text:"Matter is spread out, possessing high gravitational potential energy."}, {id:"B", text:"Gravity pulls particles inward, accelerating them."}, {id:"C", text:"Kinetic energy increases as particles collide frequently."}, {id:"D", text:"Thermal energy (heat) skyrockets at the core."}], correctOrder: ["A", "B", "C", "D"] }
                ]
            },
            {
                topic: "Nuclear Fusion Ignition (Mass Defect)",
                stim: "Inside the core of a star, temperatures reach 10 million Kelvin. Under this extreme environment, four Hydrogen protons are forced together to create one Helium nucleus. However, the Helium nucleus weighs slightly less than the four original protons.",
                theory: "Nuclear fusion powers stars. The 'missing mass' (mass defect) is converted directly into a massive amount of energy according to Einstein's equation E=mc². This energy pushes outward, providing the star's heat and light.",
                vars: [
                    { type: 'mc2', qA: "What happens to the 'missing mass' when Hydrogen fuses into Helium?", optA: ["It is destroyed and ceases to exist.", "It falls into a black hole.", "It is converted directly into energy.", "It turns into dark matter."], ansA: 2, qB: "Which scientific equation governs this conversion?", optB: ["Newton's Law of Universal Gravitation", "Hubble's Law (v = H0 * d)", "Einstein's Mass-Energy Equivalence (E=mc²)", "The Ideal Gas Law (PV = nRT)"], ansB: 2 },
                    { type: 'mc2', qA: "Why are extreme temperatures (10 million K) required for nuclear fusion to occur?", optA: ["To overcome the electrostatic repulsion between positively charged protons.", "To melt the solid hydrogen into a liquid.", "To create enough gravity to hold the star together.", "To prevent the star from going supernova."], ansA: 0, qB: "Once fusion begins, what is the primary source of the energy released?", optB: ["The burning of chemical fuels.", "The mass defect (conversion of mass to energy).", "The continuing collapse of the star's outer layers.", "The absorption of the cosmic microwave background."], ansB: 1 },
                    { type: 'dd', text: "During nuclear fusion, lightweight nuclei like {0} are forced together to form heavier nuclei like {1}. The resulting nucleus has slightly {2} mass than the original components.", options: [["Iron", "Helium", "Hydrogen"], ["Hydrogen", "Helium", "Uranium"], ["more", "less", "the exact same"]], ans: [2, 1, 1] },
                    { type: 'dd', text: "The difference in mass during fusion is known as the {0}. Because the speed of light squared (c²) is such a {1} number, even a tiny amount of lost mass yields a {2} amount of energy.", options: [["mass defect", "redshift", "atomic weight"], ["small", "negative", "huge"], ["minuscule", "massive", "zero"]], ans: [0, 2, 1] },
                    { type: 'order', text: "Order the steps of hydrogen fusion in a stellar core:", items: [{id:"A", text:"Extreme heat and pressure force 4 protons close together."}, {id:"B", text:"The Strong Nuclear Force binds the protons and neutrons together."}, {id:"C", text:"A Helium nucleus is formed, which has slightly less mass."}, {id:"D", text:"The lost mass is radiated outward as photons (energy)."}], correctOrder: ["A", "B", "C", "D"] },
                    { type: 'order', text: "Order the forces/factors involved in initiating fusion, from the cause to the final effect:", items: [{id:"A", text:"Immense gravitational pressure compresses the core."}, {id:"B", text:"Core temperatures reach 10 million Kelvin."}, {id:"C", text:"Thermal kinetic energy overcomes proton electrostatic repulsion."}, {id:"D", text:"Hydrogen nuclei fuse, releasing energy via E=mc²."}], correctOrder: ["A", "B", "C", "D"] }
                ]
            },
            {
                topic: "Main Sequence & Hydrostatic Equilibrium",
                stim: "For the majority of a star's life, it exists in a stable state called the Main Sequence. During this phase, the star neither collapses inward nor explodes outward, maintaining a consistent size and temperature.",
                theory: "A star remains stable due to hydrostatic equilibrium: the exact, continuous balance between the inward crushing force of gravity and the outward pushing force of thermal and radiation pressure generated by nuclear fusion in the core.",
                vars: [

                vars: [
                    { type: 'mc2', qA: "Which sequence broadly outlines the evolution of matter in the universe?", optA: ["Stars -> Planets -> Big Bang -> Atoms", "Energy -> Subatomic Particles -> Atoms -> Stars -> Heavy Elements", "Heavy Elements -> Atoms -> Stars -> Subatomic Particles", "Galaxies -> Stars -> Big Bang -> Black Holes"], ansA: 1, qB: "Why did complex structures like stars and atoms take time to form?", optB: ["Gravity didn't exist until 1 billion years ago.", "The early universe was too hot and energetic for particles to bind together.", "The universe was expanding too slowly.", "Dark matter prevented normal matter from forming."], ansB: 1 },
                    { type: 'mc2', qA: "Could a rocky planet like Earth have formed 1 million years after the Big Bang?", optA: ["Yes, planets formed immediately.", "No, because the universe consisted almost entirely of Hydrogen and Helium.", "Yes, but they were destroyed by black holes.", "No, because the universe was too cold."], ansA: 1, qB: "What necessary event had to occur before rocky planets could exist?", optB: ["The cosmic microwave background had to fade away.", "Generations of massive stars had to live and die to forge heavy elements.", "Galaxies had to stop expanding.", "The solar system had to move to the center of the galaxy."], ansB: 1 },
                    { type: 'dd', text: "As the universe expands, it {0}. This allowed fundamental particles to bind into {1}, which later clumped together under gravity to form the first {2}.", options: [["heats up", "cools down", "remains constant"], ["stars", "black holes", "simple atoms (H, He)"], ["supernovae", "stars and galaxies", "quarks"]], ans: [1, 2, 1] },
                    { type: 'dd', text: "The history of the cosmos is one of increasing {0}. From a hot soup of plasma, it cooled to form {1}, which eventually forged the {2} required for life.", options: [["temperature", "complexity", "density"], ["simple atoms", "heavy elements", "planets"], ["hydrogen", "heavy elements", "dark energy"]], ans: [1, 0, 1] },
                    { type: 'order', text: "Order the major epochs of the Universe from EARLIEST to LATEST:", items: [{id:"A", text:"Big Bang and rapid expansion of energy."}, {id:"B", text:"Formation of the first protons and neutrons."}, {id:"C", text:"Release of the Cosmic Microwave Background (atoms form)."}, {id:"D", text:"Ignition of the first stars and formation of galaxies."}], correctOrder: ["A", "B", "C", "D"] },
                    { type: 'order', text: "Order the emergence of these structures in the history of the universe:", items: [{id:"A", text:"Quarks and basic subatomic particles"}, {id:"B", text:"Hydrogen and Helium nuclei"}, {id:"C", text:"Massive first-generation stars"}, {id:"D", text:"Rocky planets containing Iron and Silicon"}], correctOrder: ["A", "B", "C", "D"] }
                ]
            }
        ];

        let userTest = [];
        let currentQIndex = 0;
        let score = 0;
        let isAnswered = false;

        function initTest() {
            userTest = [];
            currentQIndex = 0;
            score = 0;
            
            // For each of the 15 topics, select 1 random variation
            coreTopics.forEach(topicData => {
                const randomVarIndex = Math.floor(Math.random() * topicData.vars.length);
                const selectedVar = topicData.vars[randomVarIndex];
                
                // Construct the flat question object
                userTest.push({
                    topic: topicData.topic,
                    stim: topicData.stim,
                    theory: topicData.theory,
                    ...selectedVar
                });
            });

            document.getElementById('win-screen').classList.add('hidden');
            document.getElementById('test-container').classList.remove('hidden');
            renderQuestion();
        }

        function updateProgress() {
            document.getElementById('q-current').innerText = currentQIndex + 1;
            const pct = ((currentQIndex) / 15) * 100;
            document.getElementById('progress-bar').style.width = pct + '%';
        }

        function renderQuestion() {
            isAnswered = false;
            document.getElementById('feedback-box').classList.add('hidden');
            document.getElementById('btn-check').classList.remove('hidden');
            document.getElementById('btn-next').classList.add('hidden');
            updateProgress();

            const q = userTest[currentQIndex];
            
            document.getElementById('stimulus-pane').innerHTML = `
                <div class="bg-blue-50 border-l-4 border-blue-600 p-4 rounded-r shadow-sm">
                    <h2 class="text-xl font-bold text-blue-900 mb-2">Scenario: ${q.topic}</h2>
                    <p class="text-gray-800 leading-relaxed text-lg">${q.stim}</p>
                </div>
            `;

            const qPane = document.getElementById('question-content');
            qPane.innerHTML = '';

            if (q.type === 'mc2') {
                qPane.innerHTML = `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <h3 class="text-lg font-bold text-gray-900 mb-4">Part A</h3>
                        <p class="text-gray-800 mb-4 text-lg">${q.qA}</p>
                        <div class="space-y-3" id="opts-A">
                            ${q.optA.map((opt, i) => `
                                <label class="radio-container">
                                    ${opt}
                                    <input type="radio" name="partA" value="${i}">
                                    <span class="checkmark"></span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mt-6">
                        <h3 class="text-lg font-bold text-gray-900 mb-4">Part B</h3>
                        <p class="text-gray-800 mb-4 text-lg">${q.qB}</p>
                        <div class="space-y-3" id="opts-B">
                            ${q.optB.map((opt, i) => `
                                <label class="radio-container">
                                    ${opt}
                                    <input type="radio" name="partB" value="${i}">
                                    <span class="checkmark"></span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (q.type === 'dd') {
                let htmlStr = q.text;
                q.options.forEach((optArr, i) => {
                    let selectHtml = `<select id="dd-${i}" class="inline-dd mx-1 text-blue-700 bg-blue-50"><option value="" disabled selected>[ Select ]</option>`;
                    optArr.forEach((opt, j) => {
                        selectHtml += `<option value="${j}">${opt}</option>`;
                    });
                    selectHtml += `</select>`;
                    htmlStr = htmlStr.replace(`{${i}}`, selectHtml);
                });
                qPane.innerHTML = `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <h3 class="text-lg font-bold text-gray-900 mb-4">Select the correct terms to complete the statement:</h3>
                        <p class="text-gray-800 leading-loose text-xl">${htmlStr}</p>
                    </div>
                `;
            } else if (q.type === 'order') {
                qPane.innerHTML = `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <h3 class="text-lg font-bold text-gray-900 mb-4">${q.text}</h3>
                        <p class="text-sm text-gray-500 mb-4 italic">Drag and drop the items to reorder them.</p>
                        <ul id="drag-list" class="draggable-list">
                            ${[...q.items].sort(()=>Math.random()-0.5).map(item => `
                                <li class="draggable-item" draggable="true" data-id="${item.id}">
                                    <span class="drag-handle">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                                    </span>
                                    <span class="text-lg text-gray-800 font-medium">${item.text}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
                initDragAndDrop();
            }
        }

        let dragSrcEl = null;
        function initDragAndDrop() {
            const items = document.querySelectorAll('.draggable-item');
            items.forEach(item => {
                item.addEventListener('dragstart', function(e) {
                    dragSrcEl = this;
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/html', this.innerHTML);
                    this.classList.add('dragging');
                });
                item.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    const bounding = this.getBoundingClientRect();
                    const offset = bounding.y + (bounding.height / 2);
                    if (e.clientY - offset > 0) {
                        this.style.borderBottom = "2px solid #3b82f6";
                        this.style.borderTop = "";
                    } else {
                        this.style.borderTop = "2px solid #3b82f6";
                        this.style.borderBottom = "";
                    }
                    return false;
                });
                item.addEventListener('dragleave', function(e) {
                    this.style.borderTop = "";
                    this.style.borderBottom = "";
                });
                item.addEventListener('drop', function(e) {
                    e.stopPropagation();
                    this.style.borderTop = "";
                    this.style.borderBottom = "";
                    if (dragSrcEl !== this) {
                        const list = this.parentNode;
                        const bounding = this.getBoundingClientRect();
                        const offset = bounding.y + (bounding.height / 2);
                        if (e.clientY - offset > 0) {
                            list.insertBefore(dragSrcEl, this.nextSibling);
                        } else {
                            list.insertBefore(dragSrcEl, this);
                        }
                    }
                    return false;
                });
                item.addEventListener('dragend', function() {
                    this.classList.remove('dragging');
                    items.forEach(i => { i.style.borderTop = ""; i.style.borderBottom = ""; });
                });
            });
        }

        function checkAnswer() {
            if (isAnswered) return;
            const q = userTest[currentQIndex];
            let isCorrect = false;

            if (q.type === 'mc2') {
                const ansA = document.querySelector('input[name="partA"]:checked');
                const ansB = document.querySelector('input[name="partB"]:checked');
                
                if (!ansA || !ansB) {
                    alert("Please answer both Part A and Part B.");
                    return;
                }
                
                isCorrect = (parseInt(ansA.value) === q.ansA && parseInt(ansB.value) === q.ansB);
                
                document.querySelectorAll('#opts-A label').forEach((lbl, i) => {
                    if(i === q.ansA) lbl.classList.add('text-green-700', 'font-bold');
                    else if(ansA.value == i && !isCorrect) lbl.classList.add('text-red-600', 'line-through');
                });
                document.querySelectorAll('#opts-B label').forEach((lbl, i) => {
                    if(i === q.ansB) lbl.classList.add('text-green-700', 'font-bold');
                    else if(ansB.value == i && !isCorrect) lbl.classList.add('text-red-600', 'line-through');
                });

            } else if (q.type === 'dd') {
                let allSelected = true;
                q.options.forEach((optArr, i) => {
                    const select = document.getElementById(`dd-${i}`);
                    if(!select || select.value === "") allSelected = false;
                });
                
                if(!allSelected) {
                    alert("Please complete all dropdowns.");
                    return;
                }

                let allCorrect = true;
                q.options.forEach((optArr, i) => {
                    const select = document.getElementById(`dd-${i}`);
                    if(parseInt(select.value) !== q.ans[i]) {
                        allCorrect = false;
                        if(select) select.classList.add('border-red-500', 'text-red-700', 'bg-red-50');
                    } else {
                        if(select) select.classList.add('border-green-500', 'text-green-700', 'bg-green-50');
                    }
                });
                isCorrect = allCorrect;

            } else if (q.type === 'order') {
                const currentOrder = Array.from(document.querySelectorAll('.draggable-item')).map(li => li.getAttribute('data-id'));
                isCorrect = JSON.stringify(currentOrder) === JSON.stringify(q.correctOrder);
                
                document.querySelectorAll('.draggable-item').forEach((li, i) => {
                    if (li.getAttribute('data-id') === q.correctOrder[i]) {
                        li.classList.add('border-green-500', 'bg-green-50');
                    } else {
                        li.classList.add('border-red-500', 'bg-red-50');
                    }
                });
            }

            if (isCorrect) score++;
            q.userCorrect = isCorrect;

            showFeedback(isCorrect, q.theory);
            isAnswered = true;
            document.getElementById('btn-check').classList.add('hidden');
            document.getElementById('btn-next').classList.remove('hidden');
        }

        function showFeedback(isCorrect, theory) {
            const fb = document.getElementById('feedback-box');
            fb.classList.remove('hidden', 'bg-green-100', 'border-green-500', 'text-green-800', 'bg-red-100', 'border-red-500', 'text-red-800');
            
            if(isCorrect) {
                fb.classList.add('bg-green-100', 'border-green-500', 'text-green-900', 'correct-anim');
                fb.innerHTML = `
                    <div class="flex items-center mb-2">
                        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <h4 class="font-bold text-lg">Correct!</h4>
                    </div>
                    <p class="text-base"><strong>Background Theory:</strong> ${theory}</p>
                `;
            } else {
                fb.classList.add('bg-red-100', 'border-red-500', 'text-red-900', 'incorrect-anim');
                fb.innerHTML = `
                    <div class="flex items-center mb-2">
                        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <h4 class="font-bold text-lg">Incorrect.</h4>
                    </div>
                    <p class="text-base"><strong>Background Theory:</strong> ${theory}</p>
                `;
            }
            
            const container = document.querySelector('.question-pane');
            container.scrollTop = container.scrollHeight;
        }

        function nextQuestion() {
            currentQIndex++;
            if (currentQIndex < userTest.length) {
                renderQuestion();
            } else {
                showWinScreen();
            }
        }

        function showWinScreen() {
            document.getElementById('test-container').classList.add('hidden');
            const winScreen = document.getElementById('win-screen');
            winScreen.classList.remove('hidden');
            
            const pct = score / 15;
            document.getElementById('final-score').innerText = `${score}/15`;
            
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('verif-code').innerText = code;

            if (pct >= 0.90) {
                let bursts = 1;
                if (pct >= 0.95) bursts = 2;
                if (pct === 1.0) bursts = 3;
                
                let count = 0;
                const interval = setInterval(() => {
                    confetti({
                        particleCount: 150,
                        spread: 80,
                        origin: { y: 0.6 },
                        colors: ['#1e3a8a', '#3b82f6', '#10b981', '#f59e0b']
                    });
                    count++;
                    if (count >= bursts) clearInterval(interval);
                }, 800);
            }
        }

        function downloadStudyGuide() {
            let htmlContent = `
            <!DOCTYPE html>
            <html lang="en">
            <head>
                <meta charset="UTF-8">
                <title>NM-ASR Space Science Study Guide</title>
                <style>
                    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 900px; margin: 0 auto; padding: 20px; }
                    h1 { color: #1e3a8a; border-bottom: 2px solid #1e3a8a; padding-bottom: 10px; }
                    .card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
                    .stimulus { background: #eff6ff; padding: 15px; border-left: 4px solid #3b82f6; margin-bottom: 15px; }
                    .theory { background: #ecfdf5; padding: 15px; border-left: 4px solid #10b981; margin-top: 15px; }
                    .correct { color: #047857; font-weight: bold; }
                </style>
            </head>
            <body>
                <h1>NM-ASR Space Science Study Guide</h1>
                <p>Generated from your recent practice test. Use this to review the concepts and explanations.</p>
            `;

            userTest.forEach((q, idx) => {
                htmlContent += `<div class="card">
                    <h3>Question ${idx + 1}: ${q.topic}</h3>
                    <div class="stimulus"><strong>Scenario:</strong> ${q.stim}</div>
                `;

                if (q.type === 'mc2') {
                    htmlContent += `
                        <p><strong>Part A:</strong> ${q.qA}</p>
                        <p><em>Correct Answer:</em> <span class="correct">${q.optA[q.ansA]}</span></p>
                        <p><strong>Part B:</strong> ${q.qB}</p>
                        <p><em>Correct Evidence:</em> <span class="correct">${q.optB[q.ansB]}</span></p>
                    `;
                } else if (q.type === 'dd') {
                    let filledText = q.text;
                    q.options.forEach((optArr, i) => {
                        filledText = filledText.replace(`{${i}}`, `[ <span class="correct">${optArr[q.ans[i]]}</span> ]`);
                    });
                    htmlContent += `<p><strong>Statement:</strong> ${filledText}</p>`;
                } else if (q.type === 'order') {
                    htmlContent += `<p><strong>Task:</strong> ${q.text}</p><ol>`;
                    q.correctOrder.forEach(id => {
                        const item = q.items.find(i => i.id === id);
                        htmlContent += `<li><span class="correct">${item.text}</span></li>`;
                    });
                    htmlContent += `</ol>`;
                }

                htmlContent += `
                    <div class="theory"><strong>Background Theory:</strong> ${q.theory}</div>
                </div>`;
            });

            htmlContent += `</body></html>`;

            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'NM-ASR_Space_Science_Study_Guide.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        window.onload = initTest;
    </script>
</body>
</html>
